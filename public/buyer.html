<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editions Standard B2B Showroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'DotGothic16','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Space Mono', 'Courier New', monospace; background: var(--black); color: var(--white); min-height: 100vh; transition: background .2s, color .2s; }
  .wrap { width: 100%; max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }
  h1 { font-family: var(--dot), monospace; font-size: 24px; font-weight: 400; letter-spacing: .02em; margin-bottom: 6px; }
  .sub { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); margin-bottom: 28px; text-transform: uppercase; letter-spacing: .1em; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
  .field input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 2px; padding: 12px 14px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .btn { display: block; width: 100%; background: var(--accent); color: var(--black); border: none; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .12em; text-transform: uppercase; border-radius: 2px; font-family: 'Space Mono', monospace; }
  .btn:disabled { opacity: .5; cursor: default; }
  .msg { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--soft); line-height: 1.6; margin-top: 16px; padding: 14px; background: var(--dark); border: 1px dotted var(--border); border-radius: 2px; }
  .msg.error { color: var(--accent); }
  .order-card { background: var(--dark); border: 1px solid var(--border); border-radius: 2px; padding: 16px 18px; margin-bottom: 12px; }
  .order-ref { font-family: var(--dot), monospace; font-size: 13px; color: var(--soft); letter-spacing: .04em; }
  .order-date { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .order-total { font-family: var(--dot), monospace; font-size: 20px; font-weight: 400; color: var(--accent); margin-top: 8px; }
  .order-status { display:inline-block; font-size: 11px; padding: 4px 12px; border-radius: 10px; margin-top: 8px; text-transform: uppercase; letter-spacing: .08em; font-family: 'Space Mono', monospace; }
  .order-status.confirmed { background: rgba(204,235,60,.12); color: var(--accent); }
  .order-status.validated { background: #1f3d1f; color: #5ec95e; }
  .order-status.cancelled { background: #2a2a2a; color: var(--muted); }
  .order-pdf { display: inline-block; margin-top: 10px; font-size: 11px; color: var(--soft); text-decoration: underline; text-underline-offset: 3px; font-family: 'Inter', sans-serif; letter-spacing: .02em; }
  .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
</style>
<script>
(function() {
  function getTheme() {
    const h = new Date().getHours();
    return (h >= 7 && h < 20) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<div class="wrap" id="app">
  <a href="/" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;text-decoration:none;color:var(--soft);font-size:11px;font-family:'Inter',sans-serif;letter-spacing:.04em">
    <img src="/logo.svg" style="width:24px;height:24px;border-radius:4px"> ← Accueil
  </a>
  <h1>Mon espace commandes</h1>
  <p class="sub">Consultez l'historique de vos commandes.</p>
  <div id="login-view">
    <div class="field">
      <label>Votre email</label>
      <input id="email-input" type="email" placeholder="vous@exemple.com">
    </div>
    <button class="btn" id="btn-request" onclick="requestLink()">Recevoir mon lien d'accès</button>
    <div id="login-msg"></div>
  </div>
  <div id="orders-view" style="display:none">
    <div id="brand-info" style="margin-bottom:20px"></div>
    <div id="orders-list" class="loader">Chargement…</div>
  </div>
</div>

<script>
const brandId = window.location.pathname.split('/').pop();
const urlToken = new URLSearchParams(window.location.search).get('token');

async function requestLink() {
  const email = document.getElementById('email-input').value.trim();
  const msg = document.getElementById('login-msg');
  if (!email) return;
  document.getElementById('btn-request').disabled = true;
  msg.innerHTML = '';
  try {
    const r = await fetch('/api/buyer/request-link', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brand_id: brandId, email })
    }).then(r => r.json());
    msg.innerHTML = `<div class="msg">${r.message || 'Si un compte existe pour cet email, un lien vous a été envoyé.'}</div>`;
  } catch(e) {
    msg.innerHTML = `<div class="msg error">Erreur, réessayez.</div>`;
  }
  document.getElementById('btn-request').disabled = false;
}

async function verifyAndLoad() {
  const r = await fetch(`/api/buyer/verify?brand_id=${brandId}&token=${urlToken}`).then(r => r.json());
  if (r.error) {
    document.getElementById('login-msg').innerHTML = `<div class="msg error">${r.error}</div>`;
    return;
  }
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('orders-view').style.display = 'block';
  loadBrandInfo();
  loadOrders();
}

async function loadBrandInfo() {
  try {
    const brand = await fetch('/api/buyer/brand').then(r => r.json());
    if (brand.error) return;
    const el = document.getElementById('brand-info');
    const logo = brand.logo_url || brand.logo;
    const parts = [];
    if (logo) parts.push(`<img src="${logo}" alt="${brand.name}" style="height:36px;object-fit:contain;margin-bottom:10px;display:block">`);
    if (brand.about_text) parts.push(`<p style="font-family:'Inter',sans-serif;font-size:13px;color:var(--soft);line-height:1.6;margin-bottom:12px">${brand.about_text}</p>`);
    if (brand.lookbook_url) parts.push(`<a href="${brand.lookbook_url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--black);background:var(--accent);border-radius:2px;padding:8px 14px;text-decoration:none;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">📄 Lookbook</a>`);
    if (parts.length) el.innerHTML = `<div class="order-card" style="margin-bottom:20px">${parts.join('')}</div>`;
  } catch(e) {}
}

async function loadOrders() {
  const data = await fetch('/api/buyer/orders').then(r => r.json());
  const list = document.getElementById('orders-list');
  if (!data.orders || !data.orders.length) {
    list.innerHTML = '<p style="color:#888;font-size:13px">Aucune commande trouvée.</p>';
    return;
  }
  const statusLabel = { confirmed: 'Reçue', validated: 'Validée', cancelled: 'Annulée' };
  list.innerHTML = data.orders.map(o => `
    <div class="order-card">
      <div class="order-ref">Commande #${o.id.slice(0,8).toUpperCase()}</div>
      <div class="order-date">${new Date(o.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })}</div>
      <div class="order-total">${Number(o.total||0).toFixed(2)} €</div>
      <span class="order-status ${o.status}">${statusLabel[o.status] || o.status}</span><br>
      <a class="order-pdf" href="/api/buyer/orders/${o.id}/pdf" target="_blank">📄 Télécharger le PDF</a>
    </div>
  `).join('');
}

if (urlToken) {
  verifyAndLoad();
} else {
  document.getElementById('login-msg').innerHTML = '';
}
</script>
</body>
</html>
