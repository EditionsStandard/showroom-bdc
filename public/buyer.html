<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/fonts/brand.css">
<title>Editions Standard B2B Showroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'Plex Mono','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Plex Mono', 'Space Mono', monospace; background: var(--black); color: var(--white); min-height: 100vh; transition: background .2s, color .2s; }
  .wrap { width: 100%; max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }
  h1 { font-family: var(--dot), monospace; font-size: 24px; font-weight: 400; letter-spacing: .02em; margin-bottom: 6px; }
  .sub { font-family: 'Plex Mono','Space Mono',monospace; font-size: 11px; color: var(--muted); margin-bottom: 28px; text-transform: uppercase; letter-spacing: .1em; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
  .field input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); border-radius:0; padding: 7px 1px 9px; color: var(--white); font-size: 14px; font-family: 'Plex Mono','Space Mono',monospace; outline: none; }
  .field input:focus { border-bottom-color: var(--white); }
  .btn { display: block; width: 100%; background: var(--accent); color: var(--black); border: none; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .12em; text-transform: uppercase; border-radius:0; font-family: 'Plex Mono', 'Space Mono', monospace; }
  .btn:disabled { opacity: .5; cursor: default; }
  .msg { font-family: 'Plex Mono','Space Mono',monospace; font-size: 13px; color: var(--soft); line-height: 1.6; margin-top: 16px; padding: 14px; background: var(--dark); border: 1px dotted var(--border); border-radius:0; }
  .msg.error { color: var(--accent); }
  .order-card { background: var(--dark); border: 1px solid var(--border); border-radius:0; padding: 16px 18px; margin-bottom: 12px; }
  .order-ref { font-family: var(--dot), monospace; font-size: 13px; color: var(--soft); letter-spacing: .04em; }
  .order-date { font-family: 'Plex Mono','Space Mono',monospace; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .order-total { font-family: var(--dot), monospace; font-size: 20px; font-weight: 400; color: var(--accent); margin-top: 8px; }
  .order-status { display:inline-block; font-size: 11px; padding: 4px 12px; border-radius:0; margin-top: 8px; text-transform: uppercase; letter-spacing: .08em; font-family: 'Plex Mono', 'Space Mono', monospace; }
  .order-status.confirmed { background: rgba(204,235,60,.12); color: var(--accent); }
  .order-status.validated { background: #1f3d1f; color: #5ec95e; }
  .order-status.cancelled { background: #2a2a2a; color: var(--muted); }
  .order-pdf { display: inline-block; margin-top: 10px; font-size: 11px; color: var(--soft); text-decoration: underline; text-underline-offset: 3px; font-family: 'Plex Mono','Space Mono',monospace; letter-spacing: .02em; }
  .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  #lang-btn { position:fixed; top:12px; right:12px; background:none; border:1px solid var(--border); border-radius:0; padding:3px 10px; font-size:10px; color:var(--soft); cursor:pointer; font-family:'Plex Mono','Space Mono',monospace; letter-spacing:.05em; z-index:100; }
  #lang-btn:hover { border-color:var(--accent); color:var(--white); }
  @media (max-width: 767px) {
    body { overflow-x: hidden; padding-bottom: env(safe-area-inset-bottom); }
    .field input { font-size: 16px; }
    .btn { min-height: 44px; }
  }
  /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
<script>
(function() {
  function getTheme() {
    const h = new Date().getHours();
    return (h >= 7 && h < 20) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<button id="lang-btn" onclick="toggleLang()">EN</button>
<div class="wrap" id="app">
  <a href="/" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;text-decoration:none;color:var(--soft);font-size:11px;font-family:'Plex Mono','Space Mono',monospace;letter-spacing:.04em">
    <img src="/logo.svg" style="width:24px;height:24px;border-radius:0"> ← <span id="back-home">Accueil</span>
  </a>
  <h1 id="page-title">Mon espace commandes</h1>
  <p class="sub" id="page-sub">Consultez l'historique de vos commandes.</p>
  <div id="login-view">
    <div class="field">
      <label id="lbl-email">Votre email</label>
      <input id="email-input" type="email" placeholder="vous@exemple.com">
    </div>
    <button class="btn" id="btn-request" onclick="requestLink()">Recevoir mon lien d'accès</button>
    <div id="login-msg"></div>
  </div>
  <div id="orders-view" style="display:none">
    <div id="brand-info" style="margin-bottom:20px"></div>
    <div id="orders-list" class="loader" id="orders-loading">Chargement…</div>
  </div>
</div>

<script>
const TRANSLATIONS = {
  fr: {
    back_home: 'Accueil',
    page_title: 'Mon espace commandes',
    page_sub: 'Consultez l\'historique de vos commandes.',
    lbl_email: 'Votre email',
    email_ph: 'vous@exemple.com',
    btn_request: 'Recevoir mon lien d\'accès',
    loading: 'Chargement…',
    msg_link_sent: 'Si un compte existe pour cet email, un lien vous a été envoyé.',
    err_retry: 'Erreur, réessayez.',
    no_orders: 'Aucune commande trouvée.',
    status_confirmed: 'Reçue',
    status_validated: 'Validée',
    status_cancelled: 'Annulée',
    date_locale: 'fr-FR',
    pdf_download: '📄 Télécharger le PDF',
    order_ref: (id) => `Commande #${id}`,
  },
  en: {
    back_home: 'Home',
    page_title: 'My orders',
    page_sub: 'View your order history.',
    lbl_email: 'Your email',
    email_ph: 'you@example.com',
    btn_request: 'Receive my access link',
    loading: 'Loading…',
    msg_link_sent: 'If an account exists for this email, a link has been sent to you.',
    err_retry: 'Error, please try again.',
    no_orders: 'No orders found.',
    status_confirmed: 'Received',
    status_validated: 'Validated',
    status_cancelled: 'Cancelled',
    date_locale: 'en-GB',
    pdf_download: '📄 Download PDF',
    order_ref: (id) => `Order #${id}`,
  }
};

let currentLang = localStorage.getItem('portal_lang') || 'fr';
function t(key, ...args) {
  const val = (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || TRANSLATIONS.fr[key] || key;
  return typeof val === 'function' ? val(...args) : val;
}
function applyLang() {
  document.documentElement.lang = currentLang;
  document.getElementById('lang-btn').textContent = currentLang === 'fr' ? 'EN' : 'FR';
  document.getElementById('back-home').textContent = t('back_home');
  document.getElementById('page-title').textContent = t('page_title');
  document.getElementById('page-sub').textContent = t('page_sub');
  document.getElementById('lbl-email').textContent = t('lbl_email');
  document.getElementById('email-input').placeholder = t('email_ph');
  document.getElementById('btn-request').textContent = t('btn_request');
  const ordersLoading = document.getElementById('orders-list');
  if (ordersLoading && ordersLoading.classList.contains('loader')) ordersLoading.textContent = t('loading');
}
function toggleLang() {
  currentLang = currentLang === 'fr' ? 'en' : 'fr';
  localStorage.setItem('portal_lang', currentLang);
  applyLang();
}
applyLang();

const brandId = window.location.pathname.split('/').pop();
const urlToken = new URLSearchParams(window.location.search).get('token');

async function requestLink() {
  const email = document.getElementById('email-input').value.trim();
  const msg = document.getElementById('login-msg');
  if (!email) return;
  document.getElementById('btn-request').disabled = true;
  msg.innerHTML = '';
  try {
    const r = await fetch('/api/buyer/request-link', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brand_id: brandId, email })
    }).then(r => r.json());
    msg.innerHTML = `<div class="msg">${r.message || t('msg_link_sent')}</div>`;
  } catch(e) {
    msg.innerHTML = `<div class="msg error">${t('err_retry')}</div>`;
  }
  document.getElementById('btn-request').disabled = false;
}

async function verifyAndLoad() {
  const r = await fetch(`/api/buyer/verify?brand_id=${brandId}&token=${urlToken}`).then(r => r.json());
  if (r.error) {
    document.getElementById('login-msg').innerHTML = `<div class="msg error">${r.error}</div>`;
    return;
  }
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('orders-view').style.display = 'block';
  loadBrandInfo();
  loadOrders();
}

async function loadBrandInfo() {
  try {
    const brand = await fetch('/api/buyer/brand').then(r => r.json());
    if (brand.error) return;
    const el = document.getElementById('brand-info');
    const logo = brand.logo_url || brand.logo;
    const parts = [];
    if (logo) parts.push(`<img src="${logo}" alt="${brand.name}" style="height:36px;object-fit:contain;margin-bottom:10px;display:block">`);
    if (brand.about_text) parts.push(`<p style="font-family:'Plex Mono','Space Mono',monospace;font-size:13px;color:var(--soft);line-height:1.6;margin-bottom:12px">${brand.about_text}</p>`);
    if (brand.lookbook_url) parts.push(`<a href="${brand.lookbook_url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-family:'Plex Mono','Space Mono',monospace;font-size:12px;font-weight:700;color:var(--black);background:var(--accent);border-radius:0;padding:8px 14px;text-decoration:none;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">📄 Lookbook</a>`);
    if (parts.length) el.innerHTML = `<div class="order-card" style="margin-bottom:20px">${parts.join('')}</div>`;
  } catch(e) {}
}

async function loadOrders() {
  const data = await fetch('/api/buyer/orders').then(r => r.json());
  const list = document.getElementById('orders-list');
  if (!data.orders || !data.orders.length) {
    list.innerHTML = `<p style="color:#888;font-size:13px">${t('no_orders')}</p>`;
    return;
  }
  const statusLabel = {
    confirmed: t('status_confirmed'),
    validated: t('status_validated'),
    cancelled: t('status_cancelled')
  };
  const locale = t('date_locale');
  list.innerHTML = data.orders.map(o => `
    <div class="order-card">
      <div class="order-ref">${t('order_ref', o.id.slice(0,8).toUpperCase())}</div>
      <div class="order-date">${new Date(o.created_at).toLocaleDateString(locale, { day:'2-digit', month:'long', year:'numeric' })}</div>
      <div class="order-total">${Number(o.total||0).toFixed(2)} €</div>
      <span class="order-status ${o.status}">${statusLabel[o.status] || o.status}</span><br>
      <a class="order-pdf" href="/api/buyer/orders/${o.id}/pdf" target="_blank">${t('pdf_download')}</a>
    </div>
  `).join('');
}

if (urlToken) {
  verifyAndLoad();
} else {
  document.getElementById('login-msg').innerHTML = '';
}
</script>
</body>
</html>
