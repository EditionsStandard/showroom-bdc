<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ES Agent">
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="/agent-manifest.json">
  <meta name="theme-color" content="#CCEB3C">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/fonts/brand.css">
  <title>Espace Agent — Editions Standard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"></noscript>
  <style>
    /* ── Langage minimaliste éditorial : micro-labels, champs soulignés, boutons filaires, hairlines ── */
    :root { --black:#0a0a0a; --white:#ffffff; --ink:#ffffff; --muted:rgba(255,255,255,.55);
      --line:rgba(255,255,255,.38); --line-soft:rgba(255,255,255,.16); --accent:#CCEB3C; }
    [data-theme="light"] { --black:#f5f4f0; --ink:#111111; --muted:rgba(17,17,17,.55);
      --line:rgba(17,17,17,.45); --line-soft:rgba(17,17,17,.14); --accent:#6b8500; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black); color: var(--ink);
      font-family: 'Plex Mono', 'Space Mono', monospace;
      min-height: 100vh; max-width: 360px; margin: 0 auto;
      padding: 52px 22px calc(40px + env(safe-area-inset-bottom));
      letter-spacing: .02em;
    }

    /* Logo SVG chargé en <img> → blanc sur fond sombre via filtre, noir en thème clair */
    img[src*="logo.svg"] { filter: invert(1); }
    [data-theme="light"] img[src*="logo.svg"] { filter: none; }

    /* ── Écran connexion ── */
    .logo-area { text-align: center; margin-bottom: 44px; }
    .logo-area img { width: 68px; height: 68px; }
    .logo-area .kicker { font-size: 9px; letter-spacing: .3em; color: var(--muted); margin-top: 14px; text-transform: uppercase; }
    .logo-area h1 { font-size: 12px; color: var(--ink); font-weight: 400; margin-top: 6px; letter-spacing: .3em; text-transform: uppercase; }

    label { display: block; color: var(--muted); font-size: 8.5px; font-weight: 400; text-transform: uppercase; letter-spacing: .26em; margin-bottom: 9px; }
    input {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
      border-radius: 10px; padding: 6px 1px 10px; color: var(--ink); font-size: 14px;
      font-family: inherit; letter-spacing: .04em; outline: none; transition: border-color .25s;
    }
    input:focus { border-bottom-color: var(--ink); }
    input::placeholder { color: transparent; } /* épuré : pas d'exemple dans les champs */
    .field { margin-bottom: 30px; }

    .btn {
      width: 100%; background: transparent; border: 1px solid var(--line); color: var(--ink);
      border-radius: 10px; padding: 15px 10px 14px; font-size: 11px; font-weight: 400; cursor: pointer;
      margin-top: 6px; letter-spacing: .3em; text-transform: uppercase; font-family: inherit;
      transition: background .25s, color .25s, opacity .15s;
    }
    .btn:hover:not(:disabled) { background: var(--ink); color: var(--black); }
    .btn:disabled { opacity: .5; cursor: default; }

    .err { color: #e07a6a; font-size: 11px; margin-top: 14px; letter-spacing: .04em; line-height: 1.6; }
    [data-theme="light"] .err { color: #b3402e; }

    /* ── Écran marques ── */
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .header .brand-mark { font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--ink); }
    .header .agent-name { font-size: 9px; color: var(--muted); margin-top: 6px; letter-spacing: .2em; text-transform: uppercase; }
    .logout-link {
      background: none; border: none; color: var(--muted); font-size: 9px; letter-spacing: .24em;
      text-transform: uppercase; cursor: pointer; font-family: inherit; padding: 4px 0; transition: color .2s; white-space: nowrap;
    }
    .logout-link:hover { color: var(--ink); }

    .section-label { font-size: 8.5px; color: var(--muted); letter-spacing: .28em; text-transform: uppercase; margin-bottom: 8px; }

    .brand-row {
      display: flex; align-items: center; gap: 16px; padding: 20px 2px;
      border-bottom: 1px solid var(--line-soft); text-decoration: none; color: var(--ink);
      transition: opacity .15s;
    }
    .brand-row:first-of-type { border-top: 1px solid var(--line-soft); }
    .brand-row:active { opacity: .55; }
    .brand-logo { width: 44px; height: 44px; object-fit: contain; background: #fff; flex-shrink: 0; }
    .brand-logo-ph {
      width: 44px; height: 44px; background: transparent; border: 1px solid var(--line-soft);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--muted);
    }
    .brand-name { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; }
    .brand-sub { font-size: 9px; color: var(--muted); margin-top: 5px; letter-spacing: .18em; text-transform: uppercase; }
    .brand-arrow { color: var(--muted); font-size: 13px; flex-shrink: 0; }
    .empty { color: var(--muted); font-size: 11px; text-align: center; padding: 56px 0; letter-spacing: .1em; text-transform: uppercase; line-height: 2; }

    @media (hover: hover) { .brand-row:hover { opacity: .6; } }
    @media (max-width: 767px) {
      body { padding: 40px 20px calc(28px + env(safe-area-inset-bottom)); }
      input { font-size: 16px; }
      .btn { min-height: 48px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="logo-area">
    <img src="/logo.svg" alt="Editions Standard">
    <div class="kicker">B2B Showroom</div>
    <h1>Espace Agent</h1>
  </div>
  <div class="field"><label>Email</label><input type="email" id="login-email" autocomplete="email" autocapitalize="none" autofocus></div>
  <div class="field"><label>Mot de passe</label><input type="password" id="login-pw" autocomplete="current-password"></div>
  <div id="login-err" class="err" style="display:none"></div>
  <button class="btn" id="login-btn" onclick="doLogin()">Connexion</button>
</div>

<!-- MFA -->
<div id="screen-mfa" style="display:none">
  <div class="logo-area">
    <img src="/logo.svg" alt="Editions Standard">
    <div class="kicker">B2B Showroom</div>
    <h1>Code de vérification</h1>
  </div>
  <div class="field"><label>Code à 6 chiffres (ou code de secours)</label><input type="text" id="mfa-code" inputmode="numeric" autocomplete="one-time-code" autofocus></div>
  <div id="mfa-err" class="err" style="display:none"></div>
  <button class="btn" id="mfa-btn" onclick="doMfaVerify()">Valider</button>
</div>

<!-- BRANDS -->
<div id="screen-brands" style="display:none">
  <div class="header">
    <div>
      <div class="brand-mark">Espace Agent</div>
      <div class="agent-name" id="agent-name"></div>
    </div>
    <button class="logout-link" onclick="doLogout()">Déconnexion</button>
  </div>
  <div class="section-label">Choisir une marque</div>
  <div id="brands-list"></div>
</div>

<script>
(function() {
  const _savedTheme = localStorage.getItem('es-theme') || localStorage.getItem('portal_theme_override');
  const h = new Date().getHours();
  document.documentElement.setAttribute('data-theme', _savedTheme || ((h >= 7 && h < 20) ? 'light' : 'dark'));
})();

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  if (!email || !pw) { err.textContent = 'Renseignez email et mot de passe.'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  err.style.display = 'none';
  try {
    const r = await fetch('/api/agent/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    if (r.ok) {
      const data = await r.json();
      if (data.mfaRequired) {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-mfa').style.display = 'block';
        document.getElementById('mfa-code').focus();
        btn.disabled = false; btn.textContent = 'Connexion';
        return;
      }
      showBrands(data);
    } else {
      const data = await r.json().catch(() => ({}));
      err.textContent = data.error === 'mfa_setup_required'
        ? (data.message || "Double authentification obligatoire : activez-la d'abord sur /admin.")
        : 'Email ou mot de passe incorrect.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Connexion';
    }
  } catch(e) {
    err.textContent = 'Erreur réseau — vérifiez votre connexion.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Connexion';
  }
}

async function doMfaVerify() {
  const raw = document.getElementById('mfa-code').value.trim();
  const btn = document.getElementById('mfa-btn');
  const err = document.getElementById('mfa-err');
  if (!raw) return;
  btn.disabled = true; btn.textContent = 'Vérification…';
  err.style.display = 'none';
  const body = raw.includes('-') ? { backup_code: raw } : { code: raw };
  try {
    const r = await fetch('/api/agent/login/mfa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (r.ok) {
      const data = await r.json();
      document.getElementById('screen-mfa').style.display = 'none';
      showBrands(data);
    } else {
      const data = await r.json().catch(() => ({}));
      err.textContent = data.error || 'Code invalide.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Valider';
    }
  } catch(e) {
    err.textContent = 'Erreur réseau — vérifiez votre connexion.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Valider';
  }
}

let _staffPingStarted = false;
function startStaffPing() {
  if (_staffPingStarted) return;
  _staffPingStarted = true;
  // Heartbeat — signale la présence de cet agent dans l'admin (Comptes → présence).
  const ping = () => fetch('/api/staff/ping', { method: 'POST' }).catch(() => {});
  ping();
  setInterval(ping, 30000);
}

function showBrands(data) {
  startStaffPing();
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-brands').style.display = 'block';
  document.getElementById('agent-name').textContent = data.name || data.email || '';
  const list = document.getElementById('brands-list');
  if (!data.brands || !data.brands.length) {
    list.innerHTML = '<div class="empty">Aucune marque assignée.<br>Contactez l\'administrateur.</div>';
    return;
  }
  list.innerHTML = data.brands.map(b => {
    const logo = (b.logo || b.logo_url)
      ? `<img class="brand-logo" src="${esc(b.logo||b.logo_url)}" alt="">`
      : `<div class="brand-logo-ph">◈</div>`;
    return `<a class="brand-row" href="/commande/${esc(b.id)}">
      ${logo}
      <div style="flex:1;min-width:0">
        <div class="brand-name">${esc(b.name)}</div>
        <div class="brand-sub">Saisir une commande</div>
      </div>
      <div class="brand-arrow">→</div>
    </a>`;
  }).join('');
}

async function checkSession() {
  try {
    const r = await fetch('/api/agent/me');
    if (r.ok) { const data = await r.json(); showBrands(data); }
  } catch(e) {}
}

async function doLogout() {
  await fetch('/api/agent/logout', { method: 'POST' }).catch(() => {});
  document.getElementById('screen-brands').style.display = 'none';
  document.getElementById('screen-login').style.display = 'block';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Connexion';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pw').value = '';
}

document.addEventListener('DOMContentLoaded', () => {
  checkSession();
  document.getElementById('login-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-pw').focus();
  });
  document.getElementById('mfa-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') doMfaVerify();
  });
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then(reg => { try { reg.update(); } catch(e) {} }).catch(() => {});
  let _swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_swReloaded) return; _swReloaded = true;
    location.reload();
  });
}
</script>
</body>
</html>
