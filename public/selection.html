<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Ma sélection — Showroom</title>
  <style>
    :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --soft:#999; --muted:#555; --accent:#CCEB3C; --input-bg:#1a1a1a; }
    [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --soft:#444; --muted:#888; --accent:#6b8500; --input-bg:#f0efeb; }
    * { box-sizing: border-box; }
    html, body { margin:0; background:var(--black); color:var(--white); font-family:'Space Mono','Courier New',monospace; }
    .wrap { max-width:760px; margin:0 auto; padding:24px 16px 120px; }
    .head { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
    .head img { height:40px; max-width:120px; object-fit:contain; }
    h1 { font-size:22px; margin:0; }
    .sub { color:var(--soft); font-size:13px; margin:4px 0 24px; }
    .line { display:flex; gap:12px; align-items:center; background:var(--dark); border:1px solid var(--border); border-radius:4px; padding:10px 12px; margin-bottom:8px; }
    .line img { width:56px; height:72px; object-fit:contain; background:#fff; border-radius:2px; flex-shrink:0; }
    .line .ph { width:56px; height:72px; background:var(--input-bg); border-radius:2px; flex-shrink:0; }
    .line .info { flex:1; min-width:0; }
    .line .ref { font-weight:700; font-size:14px; }
    .line .desc { font-size:12px; color:var(--soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .line .price { font-size:12px; color:var(--accent); margin-top:2px; }
    .qty { display:flex; align-items:center; gap:6px; }
    .qty button { width:32px; height:32px; border-radius:2px; border:1px solid var(--border); background:var(--input-bg); color:var(--white); font-size:18px; cursor:pointer; }
    .qty input { width:46px; text-align:center; background:var(--input-bg); border:1px solid var(--border); color:var(--white); border-radius:2px; height:32px; font-size:14px; }
    .card { background:var(--dark); border:1px solid var(--border); border-radius:4px; padding:16px; margin-top:18px; }
    label { display:block; font-size:10px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.08em; font-family:'Space Mono',monospace; }
    input[type=email], input[type=text], input[type=password] { width:100%; background:var(--input-bg); border:1px solid var(--border); color:var(--white); border-radius:2px; padding:10px 12px; font-size:14px; outline:none; }
    input[type=email]:focus, input[type=text]:focus, input[type=password]:focus { border-color:var(--accent); }
    input[readonly] { color:var(--muted); }
    .field { margin-bottom:12px; }
    .cgv { font-size:12px; color:var(--soft); max-height:120px; overflow:auto; border:1px solid var(--border); border-radius:4px; padding:10px; margin-bottom:10px; white-space:pre-wrap; background:var(--input-bg); }
    .chk { display:flex; align-items:flex-start; gap:8px; font-size:13px; color:var(--white); }
    #sig { width:100%; height:140px; background:#fff; border-radius:4px; touch-action:none; cursor:crosshair; }
    .sigbar { display:flex; justify-content:space-between; align-items:center; margin:6px 0; }
    .link { color:var(--accent); cursor:pointer; font-size:12px; background:none; border:none; }
    .bar { position:fixed; bottom:0; left:0; right:0; background:var(--accent); color:#111; display:flex; justify-content:space-between; align-items:center; padding:14px 18px calc(14px + env(safe-area-inset-bottom)); }
    .bar strong { font-size:17px; }
    .bar button { background:#111; color:#fff; border:none; padding:13px 22px; border-radius:2px; font-weight:700; cursor:pointer; font-size:14px; font-family:'Space Mono',monospace; }
    .bar button:disabled { opacity:.5; cursor:not-allowed; }
    .msg { padding:40px 16px; text-align:center; color:var(--soft); }
    .err { color:#e07a7a; }
    #lang-btn { position:fixed; top:12px; right:12px; background:none; border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:10px; color:var(--soft); cursor:pointer; font-family:'Space Mono',monospace; letter-spacing:.05em; z-index:100; }
  @media (max-width: 767px) {
    body { overflow-x: hidden; }
    .wrap { padding-bottom: calc(120px + env(safe-area-inset-bottom)); }
    input[type=email], input[type=text], input[type=password] { font-size: 16px; }
    .qty button { width: 44px; height: 44px; font-size: 20px; }
    .qty input { height: 44px; font-size: 16px; }
    .bar button { min-height: 44px; }
  }
  </style>
  <script>
  (function() {
    const h = new Date().getHours();
    document.documentElement.setAttribute('data-theme', (h >= 7 && h < 20) ? 'light' : 'dark');
  })();
  </script>
</head>
<body>
  <button id="lang-btn" onclick="toggleLang()">EN</button>
  <div class="wrap" id="wrap"><div class="msg" id="loading-msg">Chargement…</div></div>
  <div class="bar" id="bar" style="display:none">
    <div><span id="total-label" style="font-size:11px;display:block">Total HT</span><strong id="total">0 €</strong></div>
    <button id="confirm-btn" onclick="confirmSelection()">Valider ma commande</button>
  </div>

<script>
const TRANSLATIONS = {
  fr: {
    loading: 'Chargement…',
    err_network: 'Erreur réseau. Réessayez.',
    err_unavailable: 'Sélection indisponible.',
    total_ht: 'Total HT',
    confirm_btn: 'Valider ma commande',
    sub_prepared: (name) => `Sélection préparée pour ${name} — vérifiez les quantités puis validez.`,
    lbl_store: 'Boutique',
    lbl_contact: 'Nom du contact',
    lbl_email: 'Email',
    lbl_pw_existing: 'Votre mot de passe',
    lbl_pw_new: 'Créez votre mot de passe (8 caractères min.)',
    account_exists_msg: (email) => `Vous avez déjà un compte (${email}). Saisissez votre mot de passe pour valider.`,
    cgv_title: 'Conditions générales de vente',
    cgv_accept: 'J\'accepte les conditions générales de vente.',
    sig_title: 'Signature',
    sig_clear: 'Effacer',
    err_cgv: 'Veuillez accepter les CGV.',
    err_sig: 'Veuillez signer.',
    err_qty: 'Aucune quantité.',
    validating: 'Validation…',
    err_network_confirm: 'Erreur réseau.',
    err_generic: 'Erreur',
    success_title: 'Commande confirmée',
    success_msg: 'Un email de confirmation vous a été envoyé.',
    success_cta: 'Accéder à mon espace →',
  },
  en: {
    loading: 'Loading…',
    err_network: 'Network error. Please try again.',
    err_unavailable: 'Selection unavailable.',
    total_ht: 'Total excl. VAT',
    confirm_btn: 'Confirm my order',
    sub_prepared: (name) => `Selection prepared for ${name} — check quantities and confirm.`,
    lbl_store: 'Store',
    lbl_contact: 'Contact name',
    lbl_email: 'Email',
    lbl_pw_existing: 'Your password',
    lbl_pw_new: 'Create your password (min. 8 characters)',
    account_exists_msg: (email) => `You already have an account (${email}). Enter your password to confirm.`,
    cgv_title: 'Terms & Conditions',
    cgv_accept: 'I accept the terms and conditions of sale.',
    sig_title: 'Signature',
    sig_clear: 'Clear',
    err_cgv: 'Please accept the terms and conditions.',
    err_sig: 'Please sign.',
    err_qty: 'No quantity selected.',
    validating: 'Processing…',
    err_network_confirm: 'Network error.',
    err_generic: 'Error',
    success_title: 'Order confirmed',
    success_msg: 'A confirmation email has been sent to you.',
    success_cta: 'Go to my account →',
  }
};

let currentLang = localStorage.getItem('portal_lang') || 'fr';
function t(key, ...args) {
  const val = (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || TRANSLATIONS.fr[key] || key;
  return typeof val === 'function' ? val(...args) : val;
}
function applyLang() {
  document.documentElement.lang = currentLang;
  document.getElementById('lang-btn').textContent = currentLang === 'fr' ? 'EN' : 'FR';
  const loadingMsg = document.getElementById('loading-msg');
  if (loadingMsg) loadingMsg.textContent = t('loading');
  const totalLabel = document.getElementById('total-label');
  if (totalLabel) totalLabel.textContent = t('total_ht');
  const confirmBtn = document.getElementById('confirm-btn');
  if (confirmBtn && confirmBtn.textContent !== t('validating')) confirmBtn.textContent = t('confirm_btn');
}
function toggleLang() {
  currentLang = currentLang === 'fr' ? 'en' : 'fr';
  localStorage.setItem('portal_lang', currentLang);
  applyLang();
}
applyLang();

const TOKEN = location.pathname.split('/').pop();
let DATA = null, ctx = null, drawn = false;

async function load() {
  let r;
  try { r = await fetch('/api/selection/' + TOKEN); } catch(e) { return showErr(t('err_network')); }
  const d = await r.json().catch(() => ({}));
  if (!r.ok) return showErr(d.error || t('err_unavailable'));
  DATA = d;
  render();
}
function showErr(m) { document.getElementById('wrap').innerHTML = `<div class="msg err">${m}</div>`; }

function render() {
  const b = DATA.brand;
  const logo = (b.logo || b.logo_url) ? `<img src="${b.logo||b.logo_url}" alt="">` : '';
  const linesHtml = DATA.lines.map((l, idx) => {
    let imgs = []; try { imgs = JSON.parse(l.product.images || '[]'); } catch(e) {}
    const src = imgs[0] || l.product.image_url || '';
    const img = src ? `<img src="${src}">` : `<div class="ph"></div>`;
    return `<div class="line">
      ${img}
      <div class="info">
        <div class="ref">${esc(l.product.reference)}</div>
        <div class="desc">${esc(l.product.description||'')} ${l.size?('· '+esc(l.size)):''}</div>
        <div class="price">${Number(l.product.price).toFixed(2)} € HT</div>
      </div>
      <div class="qty">
        <button onclick="chg(${idx},-1)">−</button>
        <input type="number" min="0" id="q${idx}" value="${l.quantity}" oninput="recalc()">
        <button onclick="chg(${idx},1)">+</button>
      </div>
    </div>`;
  }).join('');

  const clientName = DATA.client.company || DATA.client.name || 'vous';
  const accountField = DATA.account_exists
    ? `<p style="font-size:13px;color:var(--soft);margin-bottom:8px">${t('account_exists_msg', esc(DATA.client.email))}</p>
       <div class="field"><label>${t('lbl_pw_existing')}</label><input type="password" id="pw" placeholder="••••••••"></div>`
    : `<div class="field"><label>${t('lbl_pw_new')}</label><input type="password" id="pw" placeholder="••••••••"></div>`;

  const cgvHtml = b.cgv_text
    ? `<div class="cgv">${esc(b.cgv_text)}</div>`
    : '';

  document.getElementById('wrap').innerHTML = `
    <div class="head">${logo}<h1>${esc(b.name)}</h1></div>
    <div class="sub">${t('sub_prepared', esc(clientName))}</div>
    ${linesHtml}
    <div class="card">
      <div class="field"><label>${t('lbl_store')}</label><input type="text" id="company" value="${esc(DATA.client.company||'')}"></div>
      <div class="field"><label>${t('lbl_contact')}</label><input type="text" id="name" value="${esc(DATA.client.name||'')}"></div>
      <div class="field"><label>${t('lbl_email')}</label><input type="email" id="email" value="${esc(DATA.client.email||'')}" readonly></div>
      ${accountField}
    </div>
    <div class="card">
      <label>${t('cgv_title')}</label>
      ${cgvHtml}
      <label class="chk"><input type="checkbox" id="cgv"> ${t('cgv_accept')}</label>
    </div>
    <div class="card">
      <div class="sigbar"><label style="margin:0">${t('sig_title')}</label><button class="link" onclick="clearSig()">${t('sig_clear')}</button></div>
      <canvas id="sig"></canvas>
    </div>
    <div id="form-msg" style="margin-top:12px;font-size:13px"></div>`;

  document.getElementById('bar').style.display = 'flex';
  document.getElementById('total-label').textContent = t('total_ht');
  document.getElementById('confirm-btn').textContent = t('confirm_btn');
  initSig();
  recalc();
}

function chg(idx, d) {
  const el = document.getElementById('q'+idx);
  el.value = Math.max(0, (parseInt(el.value)||0) + d);
  recalc();
}
function recalc() {
  let total = 0;
  DATA.lines.forEach((l, idx) => {
    const q = parseInt(document.getElementById('q'+idx)?.value) || 0;
    total += q * parseFloat(l.product.price||0);
  });
  document.getElementById('total').textContent = total.toFixed(2) + ' €';
}

// Signature pad
function initSig() {
  const c = document.getElementById('sig');
  const ratio = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * ratio; c.height = c.offsetHeight * ratio;
  ctx = c.getContext('2d'); ctx.scale(ratio, ratio); ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#111';
  let drawing = false;
  const pos = e => { const r = c.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
  const start = e => { drawing = true; drawn = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
  const move = e => { if (!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
  const end = () => { drawing = false; };
  c.addEventListener('mousedown', start); c.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
  c.addEventListener('touchstart', start, {passive:false}); c.addEventListener('touchmove', move, {passive:false}); c.addEventListener('touchend', end);
}
function clearSig() { const c = document.getElementById('sig'); ctx.clearRect(0,0,c.width,c.height); drawn = false; }

async function confirmSelection() {
  const msg = document.getElementById('form-msg');
  msg.innerHTML = '';
  if (!document.getElementById('cgv').checked) { msg.innerHTML = '<span class="err">' + t('err_cgv') + '</span>'; return; }
  if (!drawn) { msg.innerHTML = '<span class="err">' + t('err_sig') + '</span>'; return; }
  const lines = DATA.lines.map((l, idx) => ({ product_id: l.product_id, size: l.size||'', quantity: parseInt(document.getElementById('q'+idx).value)||0 }));
  if (!lines.some(l => l.quantity > 0)) { msg.innerHTML = '<span class="err">' + t('err_qty') + '</span>'; return; }
  const body = {
    password: document.getElementById('pw') ? document.getElementById('pw').value : '',
    signature: document.getElementById('sig').toDataURL('image/png'),
    cgv_accepted: 1,
    lines
  };
  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = t('validating');
  let r;
  try { r = await fetch('/api/selection/' + TOKEN + '/confirm', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); }
  catch(e) { btn.disabled = false; btn.textContent = t('confirm_btn'); msg.className = 'err'; msg.textContent = t('err_network_confirm'); return; }
  const d = await r.json().catch(() => ({}));
  if (!r.ok) { btn.disabled = false; btn.textContent = t('confirm_btn'); msg.className = 'err'; msg.textContent = d.error || t('err_generic'); return; }
  document.getElementById('bar').style.display = 'none';
  document.getElementById('wrap').innerHTML = `<div class="msg"><div style="font-size:48px;color:var(--accent);margin-bottom:12px">✓</div><h1>${t('success_title')}</h1><p class="sub">${t('success_msg')}</p><button class="bar-btn" onclick="location.href='/portal'" style="margin-top:16px;background:var(--accent);color:#111;border:none;padding:12px 24px;border-radius:8px;font-weight:700;cursor:pointer">${t('success_cta')}</button></div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
load();
</script>
</body>
</html>
