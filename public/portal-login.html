<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editions Standard B2B Showroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'DotGothic16','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Mono', 'Courier New', monospace; color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    background:
      radial-gradient(120% 90% at 70% 25%, rgba(90,140,40,.22), transparent 55%),
      linear-gradient(160deg, #0c120a 0%, #070707 62%);
    background-attachment: fixed; }
  [data-theme="light"] body { background:
      radial-gradient(120% 90% at 70% 25%, rgba(120,160,55,.30), transparent 55%),
      linear-gradient(160deg, #18230f 0%, #0c0f08 62%); }
  .card { background: var(--dark); border: 1px solid var(--border); border-radius: 0; padding: 48px 40px; width: 100%; max-width: 380px; position: relative; overflow: hidden; }
  /* Signature brute : filet accent plat en haut de la carte (sans glow) */
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .logo-wrap { text-align: center; margin-bottom: 32px; position: relative; }
  .logo-wrap img { width: 64px; height: 64px; border-radius: 8px; }
  .logo-wrap .kicker { font-family: var(--dot), monospace; font-size: 10px; letter-spacing: .28em; color: var(--muted); margin-top: 16px; text-transform: uppercase; }
  .logo-wrap h1 { font-family: var(--dot), monospace; font-size: 18px; color: var(--white); font-weight: 400; margin-top: 6px; letter-spacing: .02em; }
  .logo-wrap p { color: var(--muted); font-size: 11px; margin-top: 4px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: .1em; }
  label { display: block; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-family: 'Inter', sans-serif; }
  input { width: 100%; background: var(--black); border: 1px solid var(--border); border-radius: 2px; padding: 12px 14px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--accent); }
  .field { margin-bottom: 16px; }
  .btn { width: 100%; background: var(--accent); color: var(--black); border: none; border-radius: 8px; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .1em; text-transform: uppercase; font-family: 'Space Mono', monospace; transition: opacity .15s ease; }
  .btn:hover:not(:disabled) { opacity: .85; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-ghost { width: 100%; background: none; border: 1px solid var(--border); color: var(--soft); border-radius: 8px; padding: 12px 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .1em; text-transform: uppercase; font-family: 'Space Mono', monospace; transition: border-color .2s, color .2s; }
  .btn-ghost:hover { border-color: var(--soft); color: var(--white); }
  .alert { border-radius: 2px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; font-family: 'Inter', sans-serif; }
  .alert-error { background: #1a0a0a; border: 1px solid #c0392b33; color: #e74c3c; }
  .alert-success { background: #0a1a0a; border: 1px solid #27ae6033; color: #2ecc71; }
  .toggle { text-align: center; margin-top: 18px; }
  .toggle a { color: var(--soft); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Inter', sans-serif; }
  .view { display: none; }
  .view.active { display: block; }
  .back-link { display: inline-block; margin-bottom: 20px; color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: underline; background: none; border: none; padding: 0; }
  #lang-select { position: absolute; top: 0; right: 0; background: var(--dark); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--soft); cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: .05em; transition: border-color .2s, color .2s; }
  #lang-select:hover { border-color: var(--accent); color: var(--white); }
  @media (max-width: 767px) {
    body { overflow-x: hidden; align-items: flex-start; padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); }
    .card { padding: 32px 20px; }
    input { font-size: 16px; }
    .btn, .btn-ghost { min-height: 44px; }
  }
  /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
<script>
(function() {
  const h = new Date().getHours();
  document.documentElement.setAttribute('data-theme', (h >= 7 && h < 20) ? 'light' : 'dark');
})();
</script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <select id="lang-select" onchange="setLang(this.value)" title="Langue / Language" aria-label="Langue">
      <option value="fr">🌐 FR</option>
      <option value="en">🌐 EN</option>
      <option value="it">🌐 IT</option>
      <option value="es">🌐 ES</option>
      <option value="de">🌐 DE</option>
      <option value="zh">🌐 中文</option>
      <option value="ja">🌐 日本語</option>
      <option value="ko">🌐 한국어</option>
      <option value="th">🌐 ไทย</option>
    </select>
    <img src="/logo.svg" alt="Editions Standard">
    <div class="kicker">B2B Showroom</div>
    <h1 data-t="portal_title">Portail Acheteur</h1>
    <p>Editions Standard — Showroom</p>
  </div>

  <!-- Vue : connexion -->
  <div class="view active" id="view-login">
    <div id="login-error" style="display:none" class="alert alert-error" data-t="login_error">Email ou mot de passe incorrect.</div>
    <form method="POST" action="/editions-showroom-b2b-portail" id="login-form">
      <input type="hidden" name="next" id="next-field" value="">
      <div class="field"><label data-t="email_label">Email</label><input type="email" name="email" autofocus data-tp="email_placeholder"></div>
      <div class="field"><label data-t="password_label">Mot de passe</label><input type="password" name="password" data-tp="password_placeholder"></div>
      <button class="btn" type="submit" data-t="login_btn">Connexion</button>
    </form>
    <div class="toggle">
      <a onclick="showView('forgot')" data-t="forgot_link">Mot de passe oublié ?</a>
    </div>
  </div>

  <!-- Vue : mot de passe oublié -->
  <div class="view" id="view-forgot">
    <button class="back-link" onclick="showView('login')" data-t="back_link">← Retour</button>
    <div id="forgot-msg"></div>
    <div class="field"><label data-t="your_email_label">Votre email</label><input type="email" id="forgot-email" data-tp="email_placeholder"></div>
    <button class="btn" id="forgot-btn" onclick="sendReset()" data-t="send_reset_btn">Envoyer le lien</button>
  </div>

  <!-- Vue : nouveau mot de passe -->
  <div class="view" id="view-reset">
    <div id="reset-msg"></div>
    <div class="field"><label data-t="new_password_label">Nouveau mot de passe</label><input type="password" id="reset-pw" data-tp="password_placeholder" minlength="6"></div>
    <div class="field"><label data-t="confirm_password_label">Confirmer</label><input type="password" id="reset-pw2" data-tp="password_placeholder"></div>
    <button class="btn" id="reset-btn" onclick="submitReset()" data-t="save_btn">Enregistrer</button>
  </div>
</div>

    send_reset_btn: 'Link senden', new_password_label: 'Neues Passwort', confirm_password_label: 'Bestätigen',
    save_btn: 'Speichern', login_error: 'E-Mail oder Passwort falsch.', email_required: 'E-Mail erforderlich.',

    save_btn: '保存', login_error: '邮箱或密码错误。', email_required: '请输入邮箱。',

  ja: {

    send_reset_btn: 'ส่งลิงก์', new_password_label: 'รหัสผ่านใหม่', confirm_password_label: 'ยืนยัน',
    save_btn: 'บันทึก', login_error: 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', email_required: 'ต้องระบุอีเมล',

    pw_updated: 'อัปเดตรหัสผ่านแล้ว กำลังเปลี่ยนเส้นทาง…', network_error: 'เกิดข้อผิดพลาดเครือข่าย โปรดลองอีกครั้ง',
  }

let currentLang = localStorage.getItem('portal_lang') || 'fr';

function t(key) {
  return (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || key;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.querySelectorAll('[data-tp]').forEach(el => { el.placeholder = t(el.dataset.tp); });
  const sel = document.getElementById('lang-select'); if (sel) sel.value = currentLang;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('portal_lang', currentLang); // partagé avec le portail après connexion
  applyLang();
}

applyLang();

let resetToken = null;

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

// Afficher l'erreur de login si ?error dans l'URL
if (location.search.includes('error')) {
  document.getElementById('login-error').style.display = 'block';
}

// Préserver le ?next= pour la redirection post-login (scan QR)
const nextParam = new URLSearchParams(location.search).get('next');
if (nextParam && nextParam.startsWith('/portal')) {
  document.getElementById('next-field').value = nextParam;
}

// Si ?token= dans l'URL → vue de réinitialisation
const params = new URLSearchParams(location.search);
if (params.get('token')) {
  resetToken = params.get('token');
  showView('reset');
}

async function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  const msg = document.getElementById('forgot-msg');
  const btn = document.getElementById('forgot-btn');
  if (!email) { msg.innerHTML = `<div class="alert alert-error">${t('email_required')}</div>`; return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await fetch('/api/portal/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Toujours afficher succès (ne pas révéler si l'email existe)
    msg.innerHTML = `<div class="alert alert-success">${t('reset_success')}</div>`;
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">${t('network_error')}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = t('send_reset_btn');
  }
}

async function submitReset() {
  const pw = document.getElementById('reset-pw').value;
  const pw2 = document.getElementById('reset-pw2').value;
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('reset-btn');
  if (pw.length < 6) { msg.innerHTML = `<div class="alert alert-error">${t('pw_too_short')}</div>`; return; }
  if (pw !== pw2) { msg.innerHTML = `<div class="alert alert-error">${t('pw_mismatch')}</div>`; return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch('/api/portal/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: pw })
    }).then(r => r.json());
    if (r.error) { msg.innerHTML = `<div class="alert alert-error">${r.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">${t('pw_updated')}</div>`;
    setTimeout(() => { window.location = '/editions-showroom-b2b-portail'; }, 1500);
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">${t('network_error')}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = t('save_btn');
  }
}
</script>
