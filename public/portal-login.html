<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ── Langage minimaliste éditorial : micro-labels, champs soulignés, bouton filaire ── */
  :root { --black:#0a0a0a; --white:#ffffff; --ink:#ffffff; --muted:rgba(255,255,255,.55);
    --line:rgba(255,255,255,.38); --line-soft:rgba(255,255,255,.16); --accent:#CCEB3C; }
  [data-theme="light"] { --black:#f5f4f0; --ink:#111111; --muted:rgba(17,17,17,.55);
    --line:rgba(17,17,17,.45); --line-soft:rgba(17,17,17,.14); --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plex Mono', 'Space Mono', monospace; color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; background: var(--black); position: relative; }
  /* Fond image uploadé depuis Réglages (texte forcé en blanc + vignette pour la lisibilité) */
  body.with-bg { --ink:#ffffff; --muted:rgba(255,255,255,.6); --line:rgba(255,255,255,.45);
    --line-soft:rgba(255,255,255,.2); --accent:#CCEB3C;
    background-size: cover; background-position: center; background-attachment: fixed; }
  body.with-bg::before { content:''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 42%, rgba(0,0,0,.18) 25%, rgba(0,0,0,.6) 100%); }
  /* Fond vidéo (mp4/webm uploadé dans Réglages) : plein écran derrière la vignette */
  .bg-video { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
  .card { width: 100%; max-width: 340px; position: relative; }
  .logo-wrap { text-align: center; margin-bottom: 38px; position: relative; }
  .logo-wrap img { width: 76px; height: 76px; }
  .logo-wrap .kicker { font-size: 9px; letter-spacing: .3em; color: var(--muted); margin-top: 14px; text-transform: uppercase; }
  .logo-wrap h1 { font-size: 12px; color: var(--ink); font-weight: 400; margin-top: 6px; letter-spacing: .3em; text-transform: uppercase; }
  .logo-wrap p { color: var(--muted); font-size: 8.5px; margin-top: 6px; text-transform: uppercase; letter-spacing: .22em; }
  label { display: block; color: var(--muted); font-size: 8.5px; font-weight: 400; text-transform: uppercase; letter-spacing: .26em; margin-bottom: 9px; }
  input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
    border-radius: 0; padding: 6px 1px 10px; color: var(--ink); font-size: 14px;
    font-family: inherit; letter-spacing: .04em; outline: none; transition: border-color .25s; }
  input:focus { border-bottom-color: var(--ink); }
  input::placeholder { color: transparent; } /* épuré : pas d'exemple dans les champs de connexion */
  .field { margin-bottom: 30px; }
  .btn { width: 100%; background: transparent; border: 1px solid var(--line); color: var(--ink);
    border-radius: 0; padding: 15px 10px 14px; font-size: 11px; font-weight: 400; cursor: pointer;
    margin-top: 6px; letter-spacing: .3em; text-transform: uppercase; font-family: inherit;
    transition: background .25s, color .25s, opacity .15s; }
  .btn:hover:not(:disabled) { background: var(--ink); color: var(--black); }
  body.with-bg .btn:hover:not(:disabled) { color: #0a0a0a; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-ghost { width: 100%; background: none; border: 1px solid var(--line-soft); color: var(--muted);
    border-radius: 0; padding: 13px 10px 12px; font-size: 10px; font-weight: 400; cursor: pointer;
    margin-top: 8px; letter-spacing: .3em; text-transform: uppercase; font-family: inherit;
    transition: border-color .2s, color .2s; }
  .btn-ghost:hover { border-color: var(--line); color: var(--ink); }
  .alert { border: 1px solid var(--line-soft); border-left: 2px solid currentColor;
    padding: 12px 14px; font-size: 11px; margin-bottom: 26px; letter-spacing: .04em; line-height: 1.7; }
  .alert-error { color: #e07a6a; }
  .alert-success { color: #7fbf7f; }
  [data-theme="light"] body:not(.with-bg) .alert-error { color: #b3402e; }
  [data-theme="light"] body:not(.with-bg) .alert-success { color: #1e7a45; }
  .toggle { text-align: center; margin-top: 26px; }
  .toggle a { display: block; color: var(--muted); font-size: 9px; text-decoration: none; cursor: pointer;
    text-transform: uppercase; letter-spacing: .24em; padding: 7px 0; transition: color .2s; }
  .toggle a:hover { color: var(--ink); }
  .view { display: none; }
  .view.active { display: block; }
  .back-link { display: inline-block; margin-bottom: 24px; color: var(--muted); font-size: 9px; cursor: pointer;
    text-transform: uppercase; letter-spacing: .24em; background: none; border: none; padding: 0; font-family: inherit; }
  .back-link:hover { color: var(--ink); }
  #lang-select { position: absolute; top: -6px; right: 0; background: transparent;
    border: none; appearance: none; -webkit-appearance: none; border-radius: 0; padding: 5px 8px; font-size: 10px;
    color: var(--muted); cursor: pointer; font-family: inherit; letter-spacing: .08em;
    transition: border-color .2s, color .2s; }
  #lang-select:hover { border-color: var(--line); color: var(--ink); }
  #lang-select option { background: #111; color: #fff; }
  @media (max-width: 767px) {
    body { overflow-x: hidden; padding: 32px 18px calc(24px + env(safe-area-inset-bottom)); }
    input { font-size: 16px; }
    .btn, .btn-ghost { min-height: 46px; }
  }
  /* Logo : SVG noir chargé en <img> → blanc sur fond sombre/image via filtre */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] body:not(.with-bg) img[src*="logo.svg"]{filter:none;}
</style>

let currentLang = localStorage.getItem('portal_lang') || 'fr';

function t(key) {
  return (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || key;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.querySelectorAll('[data-tp]').forEach(el => { el.placeholder = t(el.dataset.tp); });
  const sel = document.getElementById('lang-select'); if (sel) sel.value = currentLang;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('portal_lang', currentLang); // partagé avec le portail après connexion
  applyLang();
}

applyLang();

// Fond d'écran personnalisé (uploadé depuis Admin → Réglages, changeable à volonté)
fetch("/api/public/branding").then(r => r.json()).then(b => {
  if (!b || !b.login_bg_url) return;
  const url = b.login_bg_url;
  if (/\.(mp4|webm|mov|m4v|ogv)(\?|$)/i.test(url) || /\/video\/upload\//i.test(url)) {
    // Fond vidéo : lecture muette en boucle. On force explicitement play() car
    // définir la propriété .autoplay via JS n'est pas toujours honorée (Safari,
    // mode économie d'énergie iOS) → sinon la vidéo reste figée sur l'image 0.
    const v = document.createElement("video");
    v.className = "bg-video";
    v.autoplay = true; v.muted = true; v.defaultMuted = true; v.loop = true; v.playsInline = true;
    v.setAttribute("muted", ""); v.setAttribute("playsinline", ""); v.setAttribute("autoplay", ""); v.setAttribute("loop", "");
    v.preload = "auto";
    v.src = url;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    v.addEventListener("loadeddata", () => { document.body.classList.add("with-bg"); tryPlay(); }, { once: true });
    v.addEventListener("canplay", tryPlay, { once: true });
    // Boucle infinie garantie : même si l'attribut loop est ignoré, on relance.
    v.addEventListener("ended", () => { try { v.currentTime = 0; } catch(e) {} tryPlay(); });
    document.body.prepend(v);
    tryPlay();
    // Filet de sécurité : si l'autoplay est bloqué, on relance au premier geste.
    const resume = () => tryPlay();
    document.addEventListener("touchstart", resume, { once: true, passive: true });
    document.addEventListener("click", resume, { once: true });
  } else {
    const img = new Image();
    img.onload = () => {
      document.body.style.backgroundImage = `url("${url}")`;
      document.body.classList.add("with-bg");
    };
    img.src = url;
  }
}).catch(() => {});

let resetToken = null;

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

// Afficher l'erreur de login si ?error dans l'URL
if (location.search.includes('error')) {
  document.getElementById('login-error').style.display = 'block';
}

// Préserver le ?next= pour la redirection post-login (scan QR)
const nextParam = new URLSearchParams(location.search).get('next');
if (nextParam && nextParam.startsWith('/portal')) {
  document.getElementById('next-field').value = nextParam;
}

// Si ?token= dans l'URL → vue de réinitialisation
const params = new URLSearchParams(location.search);
if (params.get('token')) {
  resetToken = params.get('token');
  showView('reset');
  // Sécurité : retire immédiatement le token de l'URL visible (barre d'adresse,
  // historique navigateur, un éventuel Referer sortant) une fois lu en mémoire.
  // (Le ?next= éventuel reste porté par le champ caché du formulaire, inutile
  // de le garder dans l'URL.)
  history.replaceState({}, document.title, location.pathname);
}

// Affiche un message dans un conteneur sans jamais interpréter le contenu comme
// du HTML (textContent) — évite toute injection XSS via un message d'erreur.
function showMessage(container, message, type) {
  container.replaceChildren();
  const alert = document.createElement('div');
  alert.className = 'alert alert-' + type;
  alert.textContent = message;
  container.appendChild(alert);
}

async function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  const msg = document.getElementById('forgot-msg');
  const btn = document.getElementById('forgot-btn');
  if (!email) { showMessage(msg, t('email_required'), 'error'); return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await fetch('/api/portal/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Toujours afficher succès (ne pas révéler si l'email existe)
    showMessage(msg, t('reset_success'), 'success');
  } catch(e) {
    showMessage(msg, t('network_error'), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = t('send_reset_btn');
  }
}

async function submitReset() {
  const pw = document.getElementById('reset-pw').value;
  const pw2 = document.getElementById('reset-pw2').value;
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('reset-btn');
  if (pw.length < 12) { showMessage(msg, t('pw_too_short'), 'error'); return; }
  if (pw !== pw2) { showMessage(msg, t('pw_mismatch'), 'error'); return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch('/api/portal/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: pw })
    }).then(r => r.json());
    if (r.error) { showMessage(msg, r.error, 'error'); return; }
    showMessage(msg, t('pw_updated'), 'success');
    setTimeout(() => { window.location = '/editions-showroom-b2b-portail'; }, 1500);
  } catch(e) {
    showMessage(msg, t('network_error'), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = t('save_btn');
  }
}
</script>
