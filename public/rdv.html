<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/fonts/brand.css">
<title>Editions Standard B2B Showroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'Plex Mono','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Plex Mono', 'Space Mono', monospace; background: var(--black); color: var(--white); min-height: 100vh; transition: background .2s, color .2s; }
  .wrap { width: 100%; max-width: 680px; margin: 0 auto; padding: 32px 20px calc(60px + env(safe-area-inset-bottom)); }
  h1 { font-family: var(--dot), monospace; font-size: 24px; font-weight: 400; letter-spacing: .02em; margin-bottom: 6px; }
  .sub { font-family: 'Plex Mono','Space Mono',monospace; font-size: 11px; color: var(--muted); margin-bottom: 28px; text-transform: uppercase; letter-spacing: .1em; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); border-radius:0; padding: 7px 1px 9px; color: var(--white); font-size: 14px; font-family: 'Plex Mono','Space Mono',monospace; outline: none; }
  .field input:focus, .field textarea:focus { border-bottom-color: var(--white); }
  .day-block { margin-bottom: 18px; }
  .day-label { font-family: var(--dot), monospace; font-size: 13px; color: var(--soft); margin-bottom: 8px; letter-spacing: .02em; }
  .slots { display: flex; flex-wrap: wrap; gap: 8px; }
  .slot-btn { background: transparent; border: 1px solid var(--border); color: var(--soft); border-radius:0; padding: 8px 14px; font-size: 12px; letter-spacing: .04em; cursor: pointer; font-family: 'Plex Mono', 'Space Mono', monospace; transition: border-color .15s, color .15s; }
  .slot-btn.selected { border-color: var(--accent); color: var(--accent); }
  .btn { display: block; width: 100%; background: var(--accent); color: var(--black); border: none; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .12em; text-transform: uppercase; border-radius:0; font-family: 'Plex Mono', 'Space Mono', monospace; margin-top: 20px; }
  .btn:disabled { opacity: .4; cursor: default; }
  .msg { font-family: 'Plex Mono','Space Mono',monospace; font-size: 13px; color: var(--soft); line-height: 1.6; margin-top: 16px; padding: 14px; background: var(--dark); border: 1px dotted var(--border); border-radius:0; }
  .msg.error { color: var(--accent); }
  .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .success-check { width:56px; height:56px; border-radius:50%; background:rgba(204,235,60,.1); border:2px dotted var(--accent); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:22px; color:var(--accent); }
  #lang-btn { position:fixed; top:12px; right:12px; background:var(--black); border:1px solid var(--border); border-radius:0; padding:4px 10px; font-size:10px; color:var(--soft); cursor:pointer; font-family:'Plex Mono','Space Mono',monospace; letter-spacing:.05em; z-index:100; appearance:none; -webkit-appearance:none; }
  #lang-btn:hover { border-color:var(--accent); color:var(--white); }
  #lang-btn option { background:#111; color:#fff; }
  @media (max-width: 767px) {
    body { overflow-x: hidden; }
    .field input, .field textarea { font-size: 16px; }
    .slot-btn { min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
    .btn { min-height: 44px; }
  }
  /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
<script>
(function() {
  function getTheme() {
    const h = new Date().getHours();
    return (h >= 7 && h < 20) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<select id="lang-btn" onchange="setLang(this.value)" aria-label="Langue / Language">
  <option value="fr">🌐 FR</option><option value="en">🌐 EN</option><option value="it">🌐 IT</option>
  <option value="es">🌐 ES</option><option value="de">🌐 DE</option><option value="zh">🌐 中文</option>
  <option value="ja">🌐 日本語</option><option value="ko">🌐 한국어</option><option value="th">🌐 ไทย</option>
</select>
<div class="wrap" id="app">
  <a href="/" style="display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;text-decoration:none;color:var(--soft);font-size:11px;font-family:'Plex Mono','Space Mono',monospace;letter-spacing:.04em">
    <img src="/logo.svg" style="width:24px;height:24px;border-radius:0"> ← Accueil
  </a>
  <h1 id="page-title">Réserver un rendez-vous</h1>
  <p class="sub" id="sub-label">Choisissez un créneau disponible</p>
  <div id="slots-container" class="loader" id="loading-slots">Chargement des créneaux…</div>

  <div id="form-section" style="display:none">
    <div class="field"><label id="lbl-name">Nom complet</label><input id="rdv-name" type="text"></div>
    <div class="field"><label id="lbl-email">Email</label><input id="rdv-email" type="email"></div>
    <div class="field"><label id="lbl-phone">Téléphone</label><input id="rdv-phone" type="tel"></div>
    <div class="field"><label id="lbl-notes">Note (optionnel)</label><textarea id="rdv-notes" rows="3"></textarea></div>
    <button class="btn" id="btn-confirm" onclick="confirmAppointment()">Confirmer le rendez-vous</button>
    <div id="rdv-msg"></div>
  </div>

  <div id="success-view" style="display:none;text-align:center;padding:40px 0">
    <div class="success-check">✓</div>
    <h1 id="success-title" style="font-size:18px">Rendez-vous confirmé</h1>
    <p class="msg" id="success-detail" style="text-align:left"></p>
  </div>
</div>

<script>

    no_slots: 'Nessuno slot disponibile al momento.', day_names: ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'],
    lbl_name: 'Nome completo', lbl_email: 'Email', lbl_phone: 'Telefono', lbl_notes: 'Nota (facoltativo)',
    btn_confirm: 'Conferma l\'appuntamento', err_pick_slot: 'Scegli uno slot.', err_name_email: 'Nome ed email obbligatori.',

  es: {
    page_title: 'Reservar una cita', sub_label: 'Elige un horario disponible',
    loading_slots: 'Cargando horarios…', err_loading: 'Error de carga. Vuelve a cargar la página.',
    no_slots: 'No hay horarios disponibles por ahora.', day_names: ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],
    lbl_name: 'Nombre completo', lbl_email: 'Correo electrónico', lbl_phone: 'Teléfono', lbl_notes: 'Nota (opcional)',
    btn_confirm: 'Confirmar la cita', err_pick_slot: 'Elige un horario.', err_name_email: 'Nombre y correo obligatorios.',
    success_title: 'Cita confirmada',
    success_detail: (name, date, time) => `${name}, tu cita está confirmada el ${date} a las ${time}.`,
    err_retry: 'Error, inténtalo de nuevo.', back_home: '← Inicio',
  },
  de: {
    page_title: 'Termin buchen', sub_label: 'Wählen Sie einen freien Termin',
    loading_slots: 'Termine werden geladen…', err_loading: 'Ladefehler. Bitte laden Sie die Seite neu.',
    no_slots: 'Derzeit keine Termine verfügbar.', day_names: ['So','Mo','Di','Mi','Do','Fr','Sa'],
    lbl_name: 'Vollständiger Name', lbl_email: 'E-Mail', lbl_phone: 'Telefon', lbl_notes: 'Notiz (optional)',
    btn_confirm: 'Termin bestätigen', err_pick_slot: 'Bitte einen Termin wählen.', err_name_email: 'Name und E-Mail erforderlich.',

    err_retry: 'Fehler, bitte erneut versuchen.', back_home: '← Startseite',

  zh: {
    page_title: '预约', sub_label: '选择一个可用时段',
    loading_slots: '正在加载时段…', err_loading: '加载错误，请刷新页面。',
    no_slots: '目前没有可用时段。', day_names: ['日','一','二','三','四','五','六'],
    lbl_name: '全名', lbl_email: '邮箱', lbl_phone: '电话', lbl_notes: '备注（可选）',
    btn_confirm: '确认预约', err_pick_slot: '请选择时段。', err_name_email: '姓名和邮箱为必填项。',
    success_title: '预约已确认',
    success_detail: (name, date, time) => `${name}，您的预约已确认：${date} ${time}。`,
    err_retry: '出错了，请重试。', back_home: '← 首页',
  },
  ja: {
    page_title: '予約する', sub_label: '空き枠を選択してください',
    loading_slots: '空き枠を読み込み中…', err_loading: '読み込みエラー。ページを再読み込みしてください。',
    no_slots: '現在、空き枠はありません。', day_names: ['日','月','火','水','木','金','土'],
    lbl_name: '氏名', lbl_email: 'メールアドレス', lbl_phone: '電話番号', lbl_notes: 'メモ（任意）',
    btn_confirm: '予約を確定する', err_pick_slot: '枠を選択してください。', err_name_email: '氏名とメールアドレスが必要です。',
    success_title: '予約が確定しました',
    success_detail: (name, date, time) => `${name} 様、ご予約は ${date} ${time} に確定しました。`,

  },
  ko: {

    loading_slots: '시간대를 불러오는 중…', err_loading: '로딩 오류. 페이지를 새로고침해 주세요.',
    no_slots: '현재 이용 가능한 시간대가 없습니다.', day_names: ['일','월','화','수','목','금','토'],
    lbl_name: '이름', lbl_email: '이메일', lbl_phone: '전화번호', lbl_notes: '메모 (선택)',
    btn_confirm: '예약 확정', err_pick_slot: '시간대를 선택하세요.', err_name_email: '이름과 이메일이 필요합니다.',
    success_title: '예약이 확정되었습니다',

    no_slots: 'ขณะนี้ไม่มีช่วงเวลาที่ว่าง', day_names: ['อา','จ','อ','พ','พฤ','ศ','ส'],
    lbl_name: 'ชื่อ-นามสกุล', lbl_email: 'อีเมล', lbl_phone: 'โทรศัพท์', lbl_notes: 'หมายเหตุ (ไม่บังคับ)',
    btn_confirm: 'ยืนยันการนัดหมาย', err_pick_slot: 'โปรดเลือกช่วงเวลา', err_name_email: 'ต้องระบุชื่อและอีเมล',
    success_title: 'ยืนยันการนัดหมายแล้ว',
    success_detail: (name, date, time) => `${name} การนัดหมายของคุณได้รับการยืนยันในวันที่ ${date} เวลา ${time}`,
    err_retry: 'เกิดข้อผิดพลาด โปรดลองอีกครั้ง', back_home: '← หน้าแรก',
  }
};

let currentLang = localStorage.getItem('portal_lang') || 'fr';
function t(key, ...args) {
  const val = (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || TRANSLATIONS.fr[key] || key;
  return typeof val === 'function' ? val(...args) : val;
}
function applyLang() {
  document.documentElement.lang = currentLang;
  const sel = document.getElementById('lang-btn'); if (sel && sel.value !== currentLang) sel.value = currentLang;
  document.getElementById('page-title').textContent = t('page_title');
  document.getElementById('sub-label').textContent = t('sub_label');
  document.getElementById('lbl-name').textContent = t('lbl_name');
  document.getElementById('lbl-email').textContent = t('lbl_email');
  document.getElementById('lbl-phone').textContent = t('lbl_phone');
  document.getElementById('lbl-notes').textContent = t('lbl_notes');
  const btn = document.getElementById('btn-confirm');
  if (btn && !btn.disabled) btn.textContent = t('btn_confirm');
  const successTitle = document.getElementById('success-title');
  if (successTitle) successTitle.textContent = t('success_title');
}
function setLang(l) {
  currentLang = l;
  localStorage.setItem('portal_lang', currentLang);
  applyLang();
  if (typeof loadSlots === 'function' && document.getElementById('slots-container')) loadSlots();
}
applyLang();

const brandId = window.location.pathname.split('/').pop();
let selectedDate = null, selectedTime = null;

async function loadSlots() {
  const container = document.getElementById('slots-container');
  container.textContent = t('loading_slots');
  let data;
  try {
    data = await fetch(`/api/public/brands/${brandId}/slots`).then(r => r.json());
  } catch(e) {
    container.innerHTML = '<p class="msg error">' + t('err_loading') + '</p>';
    return;
  }
  if (!data.slots || !data.slots.length) {
    container.innerHTML = '<p class="msg">' + t('no_slots') + '</p>';
    return;
  }
  const dayNames = t('day_names');
  container.innerHTML = data.slots.map(day => {
    const d = new Date(day.date + 'T00:00:00');
    const label = dayNames[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth()+1);
    return `<div class="day-block">
      <div class="day-label">${label}</div>
      <div class="slots">${day.times.map(ti => `<button class="slot-btn" data-date="${day.date}" data-time="${ti}" onclick="pickSlot('${day.date}','${ti}',this)">${ti}</button>`).join('')}</div>
    </div>`;
  }).join('');
}

function pickSlot(date, time, btn) {
  selectedDate = date;
  selectedTime = time;
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function confirmAppointment() {
  const client_name = document.getElementById('rdv-name').value.trim();
  const client_email = document.getElementById('rdv-email').value.trim();
  const client_phone = document.getElementById('rdv-phone').value.trim();
  const notes = document.getElementById('rdv-notes').value.trim();
  const msg = document.getElementById('rdv-msg');

  if (!selectedDate || !selectedTime) { msg.textContent = t('err_pick_slot'); msg.className = 'msg error'; return; }
  if (!client_name || !client_email) { msg.textContent = t('err_name_email'); msg.className = 'msg error'; return; }

  const btn = document.getElementById('btn-confirm');
  btn.disabled = true;
  try {
    const r = await fetch('/api/public/appointments', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brand_id: brandId, client_name, client_email, client_phone, slot_date: selectedDate, slot_time: selectedTime, notes })
    }).then(r => r.json());

    if (r.error) {
      msg.textContent = r.error; msg.className = 'msg error';
      return;
    }

    document.getElementById('app').querySelectorAll(':scope > div').forEach(el => el.style.display = 'none');
    const successView = document.getElementById('success-view');
    successView.style.display = 'block';
    document.getElementById('success-title').textContent = t('success_title');
    document.getElementById('success-detail').textContent = t('success_detail', client_name, selectedDate, selectedTime);
  } catch(e) {
    msg.innerHTML = '<div class="msg error">' + t('err_retry') + '</div>';
  } finally {
    btn.disabled = false;
  }
}

loadSlots();
</script>
</body>
</html>
