  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"></noscript>
  <style>
    /* ── Langage minimaliste éditorial (aligné sur la page de connexion) ── */
    :root { --black:#0a0a0a; --ink:#ffffff; --muted:rgba(255,255,255,.55);
      --line:rgba(255,255,255,.38); --line-soft:rgba(255,255,255,.16); --accent:#CCEB3C; }
    [data-theme="light"] { --black:#f5f4f0; --ink:#111111; --muted:rgba(17,17,17,.55);
      --line:rgba(17,17,17,.45); --line-soft:rgba(17,17,17,.14); --accent:#6b8500; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--ink); font-family: 'Plex Mono','Space Mono',monospace;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 22px; position: relative; }
    /* Fond image uploadé depuis Réglages (texte forcé en blanc + vignette) */
    body.with-bg { --ink:#ffffff; --muted:rgba(255,255,255,.6); --line:rgba(255,255,255,.45);
      --line-soft:rgba(255,255,255,.2); --accent:#CCEB3C;
      background-size: cover; background-position: center; background-attachment: fixed; }
    body.with-bg::before { content:''; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 42%, rgba(0,0,0,.18) 25%, rgba(0,0,0,.6) 100%); }
    /* Fond vidéo (mp4/webm uploadé dans Réglages) : plein écran derrière la vignette */
    .bg-video { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
    .card { width: 100%; max-width: 410px; position: relative; }
    .logo-wrap { text-align: center; margin-bottom: 30px; position: relative; }
    .logo-wrap img { width: 72px; height: 72px; }
    .logo-wrap h1 { font-size: 12px; color: var(--ink); font-weight: 400; margin-top: 14px; letter-spacing: .3em; text-transform: uppercase; }
    .logo-wrap .sub { color: var(--muted); font-size: 8.5px; margin-top: 6px; text-transform: uppercase; letter-spacing: .22em; }
    #lang-toggle { position: absolute; top: -6px; right: 0; background: none; border: none;
      border-radius: 0; padding: 5px 8px; font-size: 10px; color: var(--muted); cursor: pointer;
      font-family: inherit; letter-spacing: .08em; appearance: none; -webkit-appearance: none; transition: color .2s; }
    #lang-toggle:hover { color: var(--ink); }
    #lang-toggle option { background: #111; color: #fff; }
    .intro { font-size: 9px; color: var(--muted); line-height: 1.9; margin-bottom: 38px; text-align: center;
      text-transform: uppercase; letter-spacing: .14em; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
    .field { margin-bottom: 28px; }
    label { display: block; font-size: 8.5px; font-weight: 400; color: var(--muted); margin-bottom: 9px;
      text-transform: uppercase; letter-spacing: .26em; }
    input, select, textarea { width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--line); border-radius: 0; padding: 6px 1px 9px; font-size: 13px;
      color: var(--ink); font-family: inherit; letter-spacing: .04em; outline: none; transition: border-color .25s; }
    input:focus, select:focus, textarea:focus { border-bottom-color: var(--ink); }
    input::placeholder, textarea::placeholder { color: var(--line-soft); letter-spacing: .06em; }
    select { appearance: none; -webkit-appearance: none; cursor: pointer; }
    select option { background: #111; color: #fff; }
    textarea { resize: none; min-height: 58px; }
    .btn { width: 100%; background: transparent; border: 1px solid var(--line); color: var(--ink);
      border-radius: 0; padding: 15px 10px 14px; font-size: 11px; font-weight: 400; cursor: pointer;
      font-family: inherit; letter-spacing: .3em; text-transform: uppercase; margin-top: 10px;
      transition: background .25s, color .25s, opacity .15s; min-height: 48px; }
    .btn:hover { background: var(--ink); color: var(--black); }
    body.with-bg .btn:hover { color: #0a0a0a; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error { border: 1px solid var(--line-soft); border-left: 2px solid currentColor; color: #e07a6a;
      padding: 12px 14px; font-size: 11px; margin-bottom: 24px; letter-spacing: .04em; line-height: 1.7; display: none; }
    [data-theme="light"] body:not(.with-bg) .error { color: #b3402e; }
    .success { text-align: center; display: none; }
    .success .icon { font-size: 34px; color: var(--ink); margin-bottom: 18px; }
    .success h2 { font-size: 12px; margin-bottom: 14px; font-weight: 400; letter-spacing: .3em; text-transform: uppercase; }
    .success p { color: var(--muted); font-size: 11px; line-height: 1.9; letter-spacing: .04em; }
    .login-link { text-align: center; margin-top: 28px; font-size: 9px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .24em; }
    .login-link a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 2px; }
    .required { color: var(--muted); }
    .toggle-link { display: block; background: none; border: none; color: var(--muted); font-size: 9px;
      font-family: inherit; letter-spacing: .16em; text-transform: uppercase; text-decoration: underline;
      text-underline-offset: 3px; cursor: pointer; padding: 0; margin: -8px 0 28px; transition: color .2s; }
    .toggle-link:hover { color: var(--ink); }
    @media (max-width: 767px) {
      body { overflow-x: hidden; padding: 36px 18px calc(24px + env(safe-area-inset-bottom)); justify-content: flex-start; }
      .row { grid-template-columns: 1fr; gap: 0; }
      input, select, textarea { font-size: 16px; }
      .btn { min-height: 46px; }
    }
    /* Logo : SVG noir chargé en <img> → blanc sur fond sombre/image via filtre */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] body:not(.with-bg) img[src*="logo.svg"]{filter:none;}
</style>

  (function() {
    const _savedTheme = localStorage.getItem('es-theme') || localStorage.getItem('portal_theme_override');
    const h = new Date().getHours();
    document.documentElement.setAttribute('data-theme', _savedTheme || ((h >= 7 && h < 20) ? 'light' : 'dark'));
  })();

      <input id="f-company" type="text" autocomplete="organization">
    </div>

    <div class="field">
      <label id="t-label-email">Email professionnel <span class="required">*</span></label>
      <input id="f-email" type="email" autocomplete="email">
    </div>

    <button type="button" class="toggle-link" id="t-extra-toggle" onclick="toggleExtraFields()">+ Informations complémentaires (optionnel)</button>

    <div id="extra-fields" style="display:none">
      <div class="row">
        <div class="field">
          <label id="t-label-phone">Téléphone</label>
          <input id="f-phone" type="tel" autocomplete="tel">
        </div>
        <div class="field">
          <label id="t-label-country">Pays</label>
          <select id="f-country">
            <option value="" id="t-country-choose">— Choisir —</option>
            <option value="France" data-c="France">France</option>
            <option value="Belgique" data-c="Belgium">Belgique</option>
            <option value="Suisse" data-c="Switzerland">Suisse</option>
            <option value="Luxembourg" data-c="Luxembourg">Luxembourg</option>
            <option value="Allemagne" data-c="Germany">Allemagne</option>
            <option value="Italie" data-c="Italy">Italie</option>
            <option value="Espagne" data-c="Spain">Espagne</option>
            <option value="Royaume-Uni" data-c="UnitedKingdom">Royaume-Uni</option>
            <option value="États-Unis" data-c="UnitedStates">États-Unis</option>
            <option value="Canada" data-c="Canada">Canada</option>
            <option value="Japon" data-c="Japan">Japon</option>
            <option value="Corée du Sud" data-c="SouthKorea">Corée du Sud</option>
            <option value="Autre" data-c="Other" id="t-country-other">Autre</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label id="t-label-instagram">Instagram</label>
          <input id="f-instagram" type="text" autocomplete="off">
        </div>
        <div class="field">
          <label id="t-label-website">Website</label>
          <input id="f-website" type="url" autocomplete="url">
        </div>
      </div>

      <div class="field">
        <label id="t-label-message">Message (optionnel)</label>
        <textarea id="f-message"></textarea>
      </div>
    </div>

    <div class="field" style="margin-top:4px">
      <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-weight:400">
        <input id="f-privacy" type="checkbox" style="width:auto;margin-top:3px;flex-shrink:0">
        <span id="t-consent-privacy">J'ai lu et j'accepte la <a href="/confidentialite" target="_blank" rel="noopener">politique de confidentialité</a>. <span class="required">*</span></span>
      </label>
    </div>
    <div class="field" style="margin-top:-6px">
      <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-weight:400">
        <input id="f-marketing" type="checkbox" style="width:auto;margin-top:3px;flex-shrink:0">
        <span id="t-consent-marketing">J'accepte de recevoir les actualités et invitations d'Éditions Standard (optionnel).</span>
      </label>
    </div>

    <button class="btn" id="submit-btn" onclick="submitForm()">ENVOYER MA DEMANDE</button>

    <div class="login-link" id="t-login-link">Déjà un compte ? <a href="/editions-showroom-b2b-portail">Se connecter</a></div>
  </div>

  <div id="success-section" class="success">
    <div class="icon">✓</div>
    <h2 id="t-success-title"></h2>
    <p id="t-success-msg"></p>
    <div class="login-link" style="margin-top:24px">
      <a href="/editions-showroom-b2b-portail" id="t-back-link"></a>
    </div>
  </div>

  <div style="text-align:center;margin-top:28px;font-size:11px;letter-spacing:.04em">
    <a href="/confidentialite" style="color:var(--muted);text-decoration:none" id="t-foot-privacy">Confidentialité</a>
    <span style="color:var(--line-soft);margin:0 8px">·</span>
    <a href="/cgu" style="color:var(--muted);text-decoration:none" id="t-foot-terms">CGU</a>
    <span style="color:var(--line-soft);margin:0 8px">·</span>
    <a href="/mentions-legales" style="color:var(--muted);text-decoration:none" id="t-foot-legal">Mentions légales</a>
  </div>
</div>

// Fond d'écran personnalisé (uploadé depuis Admin → Réglages, partagé avec la connexion)
fetch("/api/public/branding").then(r => r.json()).then(b => {
  if (!b || !b.login_bg_url) return;
  const url = (window.matchMedia("(max-width: 640px)").matches && b.login_bg_url_mobile) || b.login_bg_url;
  if (/\.(mp4|webm|mov|m4v|ogv)(\?|$)/i.test(url) || /\/video\/upload\//i.test(url)) {
    // Fond vidéo : lecture muette en boucle. On force explicitement play() car
    // définir la propriété .autoplay via JS n'est pas toujours honorée (Safari,
    // mode économie d'énergie iOS) → sinon la vidéo reste figée sur l'image 0.
    const v = document.createElement("video");
    v.className = "bg-video";
    v.autoplay = true; v.muted = true; v.defaultMuted = true; v.loop = true; v.playsInline = true;
    v.setAttribute("muted", ""); v.setAttribute("playsinline", ""); v.setAttribute("autoplay", ""); v.setAttribute("loop", "");
    v.preload = "auto";
    v.src = url;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    v.addEventListener("loadeddata", () => { document.body.classList.add("with-bg"); tryPlay(); }, { once: true });
    v.addEventListener("canplay", tryPlay, { once: true });
    // Boucle infinie garantie : même si l'attribut loop est ignoré, on relance.
    v.addEventListener("ended", () => { try { v.currentTime = 0; } catch(e) {} tryPlay(); });
    document.body.prepend(v);
    tryPlay();
    // Filet de sécurité : si l'autoplay est bloqué, on relance au premier geste.
    const resume = () => tryPlay();
    document.addEventListener("touchstart", resume, { once: true, passive: true });
    document.addEventListener("click", resume, { once: true });
  } else {
    const img = new Image();
    img.onload = () => {
      document.body.style.backgroundImage = `url("${url}")`;
      document.body.classList.add("with-bg");
    };
    img.src = url;
  }
}).catch(() => {});

async function submitForm() {
  const lastName  = document.getElementById('f-name').value.trim();
  const firstName = document.getElementById('f-firstname').value.trim();
  const company   = document.getElementById('f-company').value.trim();
  const email     = document.getElementById('f-email').value.trim();
  const phone     = document.getElementById('f-phone').value.trim();
  const country   = document.getElementById('f-country').value;
  const message   = document.getElementById('f-message').value.trim();
  const errEl     = document.getElementById('error-msg');
  const btn       = document.getElementById('submit-btn');

  errEl.style.display = 'none';
  if (!lastName || !firstName || !company || !email) {
    errEl.textContent = t('err_required');
    errEl.style.display = 'block';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = t('err_email');
    errEl.style.display = 'block';
    return;
  }
  if (!document.getElementById('f-privacy').checked) {
    errEl.textContent = t('err_consent');
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = t('submitting');

  try {
    const r = await fetch('/api/access-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: `${firstName} ${lastName}`, company, email, phone, country, instagram: document.getElementById('f-instagram').value.trim(), website: document.getElementById('f-website').value.trim(), message, privacy_accepted: true, marketing_consent: document.getElementById('f-marketing').checked })
    });
    const d = await r.json();
    if (!r.ok) {
      errEl.textContent = d.error || t('err_server');
      errEl.style.display = 'block';
      return;
    }
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';
  } catch(e) {
    errEl.textContent = t('err_network');
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = t('submit');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') submitForm(); });
