<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/fonts/brand.css">
<title>Réinitialisation mot de passe — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"></noscript>
  <style>
    :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'Plex Mono','Space Mono',monospace; --line:rgba(255,255,255,.38); }
    [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; --line:rgba(17,17,17,.45); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plex Mono', 'Space Mono', monospace; background: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--dark); border: 1px solid var(--border); border-radius:0; padding: 48px 40px; width: 100%; max-width: 380px; }
    .logo-wrap { text-align: center; margin-bottom: 32px; }
    .logo-wrap img { width: 64px; height: 64px; border-radius:0; }
    .logo-wrap h1 { font-family: var(--dot), monospace; font-size: 18px; color: var(--white); font-weight: 400; margin-top: 14px; letter-spacing: .02em; }
    .logo-wrap p { color: var(--muted); font-size: 11px; margin-top: 4px; font-family: 'Plex Mono','Space Mono',monospace; text-transform: uppercase; letter-spacing: .1em; }
    label { display: block; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-family: 'Plex Mono','Space Mono',monospace; }
    input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); border-radius:0; padding: 7px 1px 9px; color: var(--white); font-size: 14px; font-family: 'Plex Mono','Space Mono',monospace; outline: none; transition: border-color .2s; }
    input:focus { border-bottom-color: var(--white); }
    .field { margin-bottom: 16px; }
    .btn { width: 100%; background: transparent; color: var(--white); border: 1px solid var(--line); border-radius:0; padding: 15px 14px 14px; font-size: 11px; font-weight: 400; cursor: pointer; margin-top: 8px; letter-spacing: .3em; text-transform: uppercase; font-family: 'Plex Mono', 'Space Mono', monospace; transition: background .25s, color .25s, opacity .15s; }
    .btn:hover:not(:disabled) { background: var(--white); color: var(--black); }
    .btn:disabled { opacity: .5; cursor: default; }
    .alert { border-radius:0; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; font-family: 'Plex Mono','Space Mono',monospace; }
    .alert-error { background: #1a0a0a; border: 1px solid #c0392b33; color: #e74c3c; }
    .alert-success { background: #0a1a0a; border: 1px solid #27ae6033; color: #2ecc71; }
    .toggle { text-align: center; margin-top: 18px; }
    .toggle a { color: var(--soft); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Plex Mono','Space Mono',monospace; }
    .view { display: none; }
    .view.active { display: block; }
    /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
  <script>
  (function() {
    const h = new Date().getHours();
    document.documentElement.setAttribute('data-theme', (h >= 7 && h < 20) ? 'light' : 'dark');
  })();
  </script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.svg" alt="Showroom B2B">
    <h1>Mot de passe oublié</h1>
    <p>Espace admin — équipe & marques</p>
  </div>

  <!-- Vue : demander le lien (pas de token dans l'URL) -->
  <div class="view active" id="view-email">
    <div id="email-msg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="vous@exemple.com" autofocus>
    </div>
    <button class="btn" id="forgot-btn" onclick="sendReset()">Envoyer le lien</button>
    <div class="toggle">
      <a href="/admin/login">← Retour à la connexion</a>
    </div>
  </div>

  <!-- Vue : choisir un nouveau mot de passe (token présent dans l'URL) -->
  <div class="view" id="view-reset">
    <div id="reset-msg"></div>
    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="reset-pw" placeholder="••••••••" minlength="12">
    </div>
    <div class="field">
      <label>Confirmer</label>
      <input type="password" id="reset-pw2" placeholder="••••••••">
    </div>
    <button class="btn" id="reset-btn" onclick="submitReset()">Réinitialiser</button>
  </div>
</div>

<script>
// Détecte un token dans l'URL
const params = new URLSearchParams(location.search);
const resetToken = params.get('token');

if (resetToken) {
  document.getElementById('view-email').classList.remove('active');
  document.getElementById('view-reset').classList.add('active');
  // Sécurité : retire immédiatement le token de l'URL visible (barre d'adresse,
  // historique navigateur, un éventuel Referer sortant) une fois lu en mémoire.
  history.replaceState({}, document.title, location.pathname);
}

// Affiche un message dans un conteneur sans jamais interpréter le contenu comme
// du HTML (textContent) — évite toute injection XSS via un message d'erreur.
function showMessage(container, message, type) {
  container.replaceChildren();
  const alert = document.createElement('div');
  alert.className = 'alert alert-' + type;
  alert.textContent = message;
  container.appendChild(alert);
}

async function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  const msg = document.getElementById('email-msg');
  const btn = document.getElementById('forgot-btn');
  if (!email) { showMessage(msg, 'Email requis.', 'error'); return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await fetch('/api/staff/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    showMessage(msg, "Si un compte existe pour cet email, vous recevrez un lien dans quelques minutes.", 'success');
    document.getElementById('forgot-email').value = '';
  } catch(e) {
    showMessage(msg, 'Erreur réseau, réessayez.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';
  }
}

async function submitReset() {
  const pw = document.getElementById('reset-pw').value;
  const pw2 = document.getElementById('reset-pw2').value;
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('reset-btn');
  if (pw.length < 12) { showMessage(msg, 'Le mot de passe doit contenir au moins 12 caractères.', 'error'); return; }
  if (pw !== pw2) { showMessage(msg, 'Les mots de passe ne correspondent pas.', 'error'); return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch('/api/staff/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: pw })
    }).then(r => r.json());
    if (r.error) { showMessage(msg, r.error, 'error'); return; }
    showMessage(msg, 'Mot de passe mis à jour. Redirection…', 'success');
    setTimeout(() => { window.location = '/admin/login'; }, 3000);
  } catch(e) {
    showMessage(msg, 'Erreur réseau, réessayez.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Réinitialiser';
  }
}
</script>
</body>
</html>
