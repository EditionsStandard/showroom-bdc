<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation mot de passe — Showroom B2B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'DotGothic16','Space Mono',monospace; }
    [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Mono', 'Courier New', monospace; background: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--dark); border: 1px solid var(--border); border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 380px; }
    .logo-wrap { text-align: center; margin-bottom: 32px; position: relative; }
    .logo-wrap img { width: 64px; height: 64px; border-radius: 8px; }
    .logo-wrap h1 { font-family: var(--dot), monospace; font-size: 18px; color: var(--white); font-weight: 400; margin-top: 14px; letter-spacing: .02em; }
    .logo-wrap p { color: var(--muted); font-size: 11px; margin-top: 4px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: .1em; }
    label { display: block; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-family: 'Inter', sans-serif; }
    input { width: 100%; background: var(--black); border: 1px solid var(--border); border-radius: 2px; padding: 12px 14px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; }
    input:focus { border-color: var(--accent); }
    .field { margin-bottom: 16px; }
    .btn { width: 100%; background: var(--accent); color: var(--black); border: none; border-radius: 2px; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .1em; text-transform: uppercase; font-family: 'Space Mono', monospace; }
    .btn:disabled { opacity: .5; cursor: default; }
    .alert { border-radius: 2px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; font-family: 'Inter', sans-serif; }
    .alert-error { background: #1a0a0a; border: 1px solid #c0392b33; color: #e74c3c; }
    .alert-success { background: #0a1a0a; border: 1px solid #27ae6033; color: #2ecc71; }
    .toggle { text-align: center; margin-top: 18px; }
    .toggle a { color: var(--soft); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Inter', sans-serif; }
    .view { display: none; }
    .view.active { display: block; }
    #lang-toggle { position: absolute; top: 0; right: 0; background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 10px; color: var(--soft); cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: .05em; transition: border-color .2s, color .2s; }
    #lang-toggle:hover { border-color: var(--accent); color: var(--white); }
    /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
  <script>
  (function() {
    const h = new Date().getHours();
    document.documentElement.setAttribute('data-theme', (h >= 7 && h < 20) ? 'light' : 'dark');
  })();
  </script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <button id="lang-toggle" onclick="toggleLang()">FR | EN</button>
    <img src="/logo.svg" alt="Showroom B2B">
    <h1 data-t="page_title">Mot de passe oublié</h1>
    <p>Showroom B2B</p>
  </div>

  <!-- Vue : demander le lien (pas de token dans l'URL) -->
  <div class="view active" id="view-email">
    <div id="email-msg"></div>
    <div class="field">
      <label data-t="email_label">Email</label>
      <input type="email" id="forgot-email" data-tp="email_placeholder" autofocus>
    </div>
    <button class="btn" id="forgot-btn" onclick="sendReset()" data-t="send_btn">Envoyer le lien</button>
    <div class="toggle">
      <a href="/editions-showroom-b2b-portail" data-t="back_login">← Retour à la connexion</a>
    </div>
  </div>

  <!-- Vue : choisir un nouveau mot de passe (token présent dans l'URL) -->
  <div class="view" id="view-reset">
    <div id="reset-msg"></div>
    <div class="field">
      <label data-t="new_pw_label">Nouveau mot de passe</label>
      <input type="password" id="reset-pw" data-tp="pw_placeholder" minlength="8">
    </div>
    <div class="field">
      <label data-t="confirm_pw_label">Confirmer</label>
      <input type="password" id="reset-pw2" data-tp="pw_placeholder">
    </div>
    <button class="btn" id="reset-btn" onclick="submitReset()" data-t="reset_btn">Réinitialiser</button>
  </div>
</div>

<script>
const TRANSLATIONS = {
  fr: {
    page_title: 'Mot de passe oublié',
    email_label: 'Email',
    email_placeholder: 'vous@exemple.com',
    send_btn: 'Envoyer le lien',
    back_login: '← Retour à la connexion',
    new_pw_label: 'Nouveau mot de passe',
    confirm_pw_label: 'Confirmer',
    pw_placeholder: '••••••••',
    reset_btn: 'Réinitialiser',
    email_required: 'Email requis.',
    send_success: 'Si un compte existe pour cet email, vous recevrez un lien dans quelques minutes.',
    pw_too_short: 'Le mot de passe doit contenir au moins 8 caractères.',
    pw_mismatch: 'Les mots de passe ne correspondent pas.',
    reset_success: 'Mot de passe mis à jour. Redirection…',
    network_error: 'Erreur réseau, réessayez.',
  },
  en: {
    page_title: 'Forgot password',
    email_label: 'Email',
    email_placeholder: 'you@example.com',
    send_btn: 'Send reset link',
    back_login: '← Back to login',
    new_pw_label: 'New password',
    confirm_pw_label: 'Confirm',
    pw_placeholder: '••••••••',
    reset_btn: 'Reset password',
    email_required: 'Email required.',
    send_success: 'If an account exists for this email, you will receive a link in a few minutes.',
    pw_too_short: 'Password must be at least 8 characters.',
    pw_mismatch: 'Passwords do not match.',
    reset_success: 'Password updated. Redirecting…',
    network_error: 'Network error, please try again.',
  }
};

let currentLang = localStorage.getItem('portal_lang') || 'fr';

function t(key) {
  return (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || key;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.querySelectorAll('[data-tp]').forEach(el => { el.placeholder = t(el.dataset.tp); });
  document.getElementById('lang-toggle').textContent = currentLang === 'fr' ? 'EN' : 'FR';
}

function toggleLang() {
  currentLang = currentLang === 'fr' ? 'en' : 'fr';
  localStorage.setItem('portal_lang', currentLang);
  applyLang();
}

// Detect token in URL
const params = new URLSearchParams(location.search);
const resetToken = params.get('token');

if (resetToken) {
  document.getElementById('view-email').classList.remove('active');
  document.getElementById('view-reset').classList.add('active');
}

applyLang();

async function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  const msg = document.getElementById('email-msg');
  const btn = document.getElementById('forgot-btn');
  if (!email) { msg.innerHTML = `<div class="alert alert-error">${t('email_required')}</div>`; return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    await fetch('/api/portal/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    msg.innerHTML = `<div class="alert alert-success">${t('send_success')}</div>`;
    document.getElementById('forgot-email').value = '';
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">${t('network_error')}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = t('send_btn');
  }
}

async function submitReset() {
  const pw = document.getElementById('reset-pw').value;
  const pw2 = document.getElementById('reset-pw2').value;
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('reset-btn');
  if (pw.length < 8) { msg.innerHTML = `<div class="alert alert-error">${t('pw_too_short')}</div>`; return; }
  if (pw !== pw2) { msg.innerHTML = `<div class="alert alert-error">${t('pw_mismatch')}</div>`; return; }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const r = await fetch('/api/portal/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: pw })
    }).then(r => r.json());
    if (r.error) { msg.innerHTML = `<div class="alert alert-error">${r.error}</div>`; return; }
    msg.innerHTML = `<div class="alert alert-success">${t('reset_success')}</div>`;
    setTimeout(() => { window.location = '/editions-showroom-b2b-portail'; }, 3000);
  } catch(e) {
    msg.innerHTML = `<div class="alert alert-error">${t('network_error')}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = t('reset_btn');
  }
}
</script>
</body>
</html>
