<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bon de Commande</title>
<style>
  @font-face {
    font-family: 'Monument Grotesk Mono';
    src: url('/fonts/MonumentGroteskMono-Regular.woff2') format('woff2'),
         url('/fonts/MonumentGroteskMono-Regular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Monument Grotesk Mono';
    src: url('/fonts/MonumentGroteskMono-Medium.woff2') format('woff2'),
         url('/fonts/MonumentGroteskMono-Medium.woff') format('woff');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
</style>
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111;
    --mid: #1c1c1c;
    --border: #252525;
    --muted: #555;
    --soft: #999;
    --white: #f5f4f0;
    --accent: #CCEB3C;
    --accent2: #a8c220;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; background: var(--black); color: var(--white); min-height: 100vh; font-weight: 400; }

  /* ── Header ── */
  .header { background: var(--black); color: var(--white); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
  .header h1 { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; font-size: 22px; font-weight: 600; letter-spacing: .02em; line-height: 1.1; }
  .header p { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: .12em; text-transform: uppercase; }
  .header-meta { display: flex; justify-content: space-between; align-items: center; }

  /* ── Steps ── */
  .steps { display: flex; background: var(--black); border-bottom: 1px solid var(--border); }
  .step { flex: 1; text-align: center; padding: 11px 4px; font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: .08em; text-transform: uppercase; transition: color .2s; }
  .step.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .step.done { color: var(--soft); }
  .step-num { display: inline-block; width: 18px; height: 18px; border-radius: 50%; background: var(--border); font-size: 9px; line-height: 18px; margin-right: 5px; }
  .step.active .step-num { background: var(--accent); color: var(--black); font-weight: 700; }
  .step.done .step-num { background: #2d2d2d; }

  /* ── Pages ── */
  .page { display: none; padding: 0 0 110px; }
  .page.active { display: block; }

  /* ── Product cards ── */
  .product-card { background: var(--dark); border-bottom: 1px solid var(--border); overflow: hidden; transition: background .15s; }
  .product-img-wrap { position: relative; overflow: hidden; }
  .product-img { width: 100%; height: 300px; object-fit: cover; display: block; cursor: pointer; transition: transform .4s ease; }
  .product-img:active { transform: scale(.98); }
  .product-img-placeholder { width: 100%; height: 3px; background: var(--border); }
  .product-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .product-collection { font-size: 9px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .16em; margin-bottom: 6px; }
  .product-ref { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; font-size: 20px; font-weight: 600; color: var(--white); letter-spacing: .01em; line-height: 1.15; }
  .product-desc { font-size: 12px; color: var(--soft); margin-top: 4px; line-height: 1.5; font-weight: 300; }
  .product-tags { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 10px; color: var(--soft); background: var(--mid); padding: 4px 10px; border-radius: 2px; letter-spacing: .06em; text-transform: uppercase; }
  .tag-price { font-size: 11px; font-weight: 600; color: var(--accent); background: rgba(204,235,60,.08); letter-spacing: .04em; }

  /* ── Variant colors ── */
  .color-btn { background: transparent; border: 1px solid var(--border); color: var(--soft); border-radius: 2px; padding: 6px 14px; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; touch-action: manipulation; transition: border-color .15s, color .15s; font-family: 'Inter', sans-serif; }
  .color-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ── Size / qty rows ── */
  .size-rows { padding: 4px 0; }
  .size-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .size-row:last-child { border-bottom: none; }
  .size-label { font-size: 12px; font-weight: 500; color: var(--white); min-width: 60px; letter-spacing: .06em; text-transform: uppercase; }
  .qty-ctrl { display: flex; align-items: center; gap: 0; }
  .qty-btn { width: 44px; height: 44px; border: 1px solid var(--border); background: transparent; font-size: 22px; line-height: 1; cursor: pointer; color: var(--soft); font-weight: 300; user-select: none; touch-action: manipulation; transition: color .15s, border-color .15s; }
  .qty-btn:first-child { border-radius: 2px 0 0 2px; }
  .qty-btn:last-child { border-radius: 0 2px 2px 0; }
  .qty-btn:active { color: var(--accent); border-color: var(--accent); }
  .qty-display { width: 48px; text-align: center; font-size: 15px; font-weight: 500; color: var(--muted); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 44px; line-height: 42px; }
  .qty-display.active { color: var(--accent); }

  /* ── Search ── */
  .search-bar { background: var(--dark); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 97px; z-index: 30; }
  .search-bar input { border: none; outline: none; flex: 1; font-size: 13px; color: var(--white); background: transparent; letter-spacing: .04em; }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 16px; }

  /* ── Cart bar ── */
  .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 40; }
  .cart-info strong { font-size: 17px; color: var(--black); display: block; font-weight: 700; }
  .cart-info span { font-size: 10px; color: rgba(0,0,0,.6); letter-spacing: .08em; text-transform: uppercase; }
  .btn-next { background: var(--black); color: var(--white); border: none; padding: 13px 24px; font-size: 12px; font-weight: 600; cursor: pointer; touch-action: manipulation; letter-spacing: .1em; text-transform: uppercase; font-family: 'Inter', sans-serif; }
  .btn-next:disabled { background: rgba(0,0,0,.25); color: rgba(0,0,0,.4); }

  /* ── Forms ── */
  .page-pad { padding: 24px 20px 110px; }
  .form-section { background: var(--dark); border: 1px solid var(--border); border-radius: 0; padding: 24px 20px; margin-bottom: 2px; }
  .form-section h3 { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--white); letter-spacing: .02em; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 8px; }
  .field input, .field textarea { width: 100%; border: none; border-bottom: 1px solid var(--border); background: transparent; padding: 10px 0; font-size: 15px; outline: none; font-family: 'Inter', sans-serif; color: var(--white); transition: border-color .2s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
  .field textarea { resize: vertical; min-height: 80px; }
  .req { color: #e74c3c; }

  /* ── Recap ── */
  .recap-card { background: var(--dark); border: 1px solid var(--border); padding: 20px; margin-bottom: 2px; }
  .recap-card h4 { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--white); letter-spacing: .04em; }
  .recap-line { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--soft); }
  .recap-line:last-child { border-bottom: none; }
  .recap-sub { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }
  .recap-price { font-weight: 600; color: var(--white); white-space: nowrap; margin-left: 8px; }

  /* ── Total ── */
  .total-bar { background: var(--mid); border: 1px solid var(--border); padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .total-bar .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; }
  .total-bar .amt { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; font-size: 28px; font-weight: 400; color: var(--accent); }

  /* ── Back btn ── */
  .btn-back { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; padding: 16px 20px; font-weight: 500; touch-action: manipulation; display: flex; align-items: center; gap: 6px; letter-spacing: .08em; text-transform: uppercase; font-family: 'Inter', sans-serif; }

  /* ── Confirm btn ── */
  .btn-confirm { width: 100%; background: var(--accent); color: var(--black); border: none; padding: 18px; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: .14em; text-transform: uppercase; font-family: 'Inter', sans-serif; margin-top: 2px; }
  .btn-confirm:disabled { background: var(--border); color: var(--muted); }

  /* ── Success ── */
  .success-page { text-align: center; padding: 80px 24px 100px; }
  .success-icon { font-size: 48px; margin-bottom: 24px; display: block; }
  .success-page h2 { font-family: 'Monument Grotesk Mono', 'Courier New', monospace; font-size: 32px; font-weight: 400; margin-bottom: 12px; color: var(--white); }
  .success-page p { font-size: 13px; color: var(--soft); line-height: 1.7; font-weight: 300; }
  .email-sent { background: rgba(204,235,60,.08); border: 1px solid rgba(204,235,60,.2); padding: 16px 20px; margin: 24px 0; font-size: 12px; color: var(--accent); letter-spacing: .04em; }

  .loader { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }

  /* ── Carousel lightbox ── */
  .img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.97); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
  .img-modal.open { display: flex; }
  .img-modal-main { position: relative; display: flex; align-items: center; justify-content: center; width: 100vw; flex: 1; }
  .img-modal-main img { max-width: 92vw; max-height: 82vh; object-fit: contain; user-select: none; }
  .img-close { position: absolute; top: 16px; right: 16px; color: var(--soft); font-size: 28px; background: none; border: none; cursor: pointer; line-height: 1; padding: 10px; touch-action: manipulation; z-index: 10; letter-spacing: .1em; font-family: 'Inter', sans-serif; font-weight: 300; }
  .img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--soft); font-size: 40px; width: 56px; height: 80px; cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center; font-weight: 200; }
  .img-nav:active { color: var(--white); }
  .img-nav-prev { left: 4px; }
  .img-nav-next { right: 4px; }
  .img-dots { display: flex; gap: 8px; padding: 16px 0 8px; }
  .img-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); border: none; cursor: pointer; padding: 0; transition: background .2s; touch-action: manipulation; }
  .img-dot.active { background: var(--accent); }
  .img-counter { color: var(--muted); font-size: 10px; padding-bottom: 10px; letter-spacing: .12em; }
</style>
</head>
<body>

<!-- Cover image -->
<div id="brand-cover-wrap" style="display:none;width:100%;height:260px;overflow:hidden;position:relative">
  <img id="brand-cover-img" src="" style="width:100%;height:100%;object-fit:cover;display:block">
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(10,10,10,.85))"></div>
</div>

<div class="header">
  <div class="header-meta">
    <div style="display:flex;align-items:center;gap:14px">
      <div id="brand-logo-wrap" style="flex-shrink:0"></div>
      <div>
        <h1 id="brand-name">Chargement…</h1>
        <p>Editions Standard — Fashion Week</p>
      </div>
    </div>
    <img src="/logo.svg" style="width:32px;height:32px;border-radius:4px;flex-shrink:0;opacity:.85">
  </div>
</div>

<div class="steps">
  <div class="step active" id="step1"><span class="step-num">1</span>Sélection</div>
  <div class="step" id="step2"><span class="step-num">2</span>Infos</div>
  <div class="step" id="step3"><span class="step-num">3</span>Récap</div>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="search-bar">
    <span class="search-icon">—</span>
    <input id="search-input" type="text" placeholder="Rechercher une référence…">
  </div>
  <div id="products-container"><div class="loader">Chargement…</div></div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <button class="btn-back" id="back-to-1">← Retour</button>
  <div class="form-section">
    <h3>Informations client</h3>
    <div class="field"><label>Nom complet <span class="req">*</span></label><input id="c-name" type="text" autocomplete="name"></div>
    <div class="field"><label>Email <span class="req">*</span></label><input id="c-email" type="email" autocomplete="email"></div>
    <div class="field"><label>Société / Boutique</label><input id="c-company" type="text" autocomplete="organization"></div>
    <div class="field"><label>Téléphone</label><input id="c-phone" type="tel" autocomplete="tel"></div>
    <div class="field"><label>Notes</label><textarea id="c-notes" placeholder="Livraison, conditions particulières…"></textarea></div>
  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <button class="btn-back" id="back-to-2">← Retour</button>
  <div class="recap-card">
    <h4>Votre sélection</h4>
    <div id="recap-lines"></div>
  </div>
  <div class="recap-card" id="client-recap"></div>
  <div class="total-bar">
    <span class="lbl">Total HT</span>
    <span class="amt" id="recap-total">0,00 €</span>
  </div>
  <button class="btn-confirm" id="btn-confirm-final" style="display:none">Confirmer la commande</button>
</div>

<!-- SUCCESS -->
<div id="page-success" class="page">
  <div class="success-page">
    <span class="success-icon">✦</span>
    <h2>Commande confirmée</h2>
    <p>Votre bon de commande a bien été enregistré.</p>
    <div class="email-sent" id="success-email-msg">Un PDF vous sera envoyé par email.</div>
    <p style="margin-top:16px;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">Merci pour votre visite</p>
  </div>
</div>

<!-- Cart bar -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-info">
    <strong id="cart-total">0,00 €</strong>
    <span id="cart-count">0 article</span>
  </div>
  <button class="btn-next" id="btn-next" disabled>Suivant</button>
</div>

<!-- Carousel lightbox -->
<div class="img-modal" id="img-modal">
  <button class="img-close" id="img-close">✕</button>
  <div class="img-modal-main">
    <button class="img-nav img-nav-prev" id="img-prev">‹</button>
    <img id="img-modal-src" src="" alt="">
    <button class="img-nav img-nav-next" id="img-next">›</button>
  </div>
  <div class="img-dots" id="img-dots"></div>
  <div class="img-counter" id="img-counter"></div>
</div>

<script>
const brandId = location.pathname.split('/').pop();
let productsData = [];
const cart = {}; // key: "productId|size" → {product, size, qty}
let currentPage = 1;

// ── Init ──────────────────────────────────────────────
async function init() {
  try {
    const data = await fetch('/api/public/brands/' + brandId).then(r => r.json());
    if (data.error) { document.getElementById('products-container').innerHTML = '<div class="loader">Marque introuvable.</div>'; return; }
    productsData = data.products;
    document.getElementById('brand-name').textContent = data.brand.name;
    // Logo (uploaded base64 preferred, fallback to logo_url)
    const logoSrc = data.brand.logo || data.brand.logo_url || '';
    if (logoSrc) {
      document.getElementById('brand-logo-wrap').innerHTML = '<img src="' + esc(logoSrc) + '" style="height:44px;max-width:100px;object-fit:contain;border-radius:4px">';
    }
    // Cover image
    if (data.brand.cover_image) {
      document.getElementById('brand-cover-img').src = data.brand.cover_image;
      document.getElementById('brand-cover-wrap').style.display = 'block';
    }
    renderProducts(productsData);
  } catch(e) {
    document.getElementById('products-container').innerHTML = '<div class="loader">Erreur de chargement. Réessayez.</div>';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Render ────────────────────────────────────────────
function renderProducts(products) {
  const container = document.getElementById('products-container');
  if (!products.length) { container.innerHTML = '<div class="loader">Aucune référence.</div>'; return; }

  container.innerHTML = products.map(p => {
    const sizes = (p.sizes||'').split(',').map(s=>s.trim()).filter(Boolean);
    const key0 = p.id + '|';

    let variants = [];
    try { variants = JSON.parse(p.variants || '[]'); } catch(e) {}
    // filter out empty variants
    variants = variants.filter(v => v.color || v.images.length);

    let imgs = [];
    try { imgs = JSON.parse(p.images || '[]'); } catch(e) {}
    if (!imgs.length && p.image_url) imgs = [p.image_url];

    // Build image block
    let imgHtml = '';
    if (variants.length) {
      // Show first variant's images, color buttons below
      const firstImgs = variants[0].images.length ? variants[0].images : imgs;
      const firstSrc = firstImgs[0] || '';
      const variantsJson = esc(JSON.stringify(variants));
      imgHtml = '<div class="product-img-wrap" style="position:relative" id="imgwrap_' + p.id + '">'
        + (firstSrc ? '<img class="product-img" id="pimg_' + p.id + '" src="' + esc(firstSrc) + '" data-images="' + esc(JSON.stringify(firstImgs)) + '" onerror="this.style.display=\'none\'">'
                    : '<div class="product-img-placeholder"></div>')
        + (firstImgs.length > 1 ? '<span id="pimgbadge_' + p.id + '" style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 7px;border-radius:12px;pointer-events:none">' + firstImgs.length + ' 📷</span>' : '<span id="pimgbadge_' + p.id + '" style="display:none"></span>')
        + '</div>'
        + '<div class="variant-colors" id="vcolors_' + p.id + '" data-pid="' + p.id + '" data-variants="' + variantsJson + '" style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px 4px">'
        + variants.map((v, vi) => '<button class="color-btn' + (vi===0?' active':'') + '" data-vi="' + vi + '" data-pid="' + p.id + '" style="' + (vi===0?'border-color:#6c63ff;color:#6c63ff':'') + '">' + esc(v.color||('Coloris '+(vi+1))) + '</button>').join('')
        + '</div>';
    } else if (imgs.length) {
      imgHtml = '<div class="product-img-wrap" style="position:relative">'
        + '<img class="product-img" src="' + esc(imgs[0]) + '" data-images="' + esc(JSON.stringify(imgs)) + '" onerror="this.parentElement.style.display=\'none\'">'
        + (imgs.length > 1 ? '<span style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 7px;border-radius:12px;pointer-events:none">' + imgs.length + ' 📷</span>' : '')
        + '</div>';
    } else {
      imgHtml = '<div class="product-img-placeholder"></div>';
    }

    const sizeRowsHtml = sizes.length > 0
      ? sizes.map(sz => {
          const k = p.id + '|' + sz;
          const q = cart[k] ? cart[k].qty : 0;
          return '<div class="size-row">'
            + '<span class="size-label">' + esc(sz) + '</span>'
            + '<div class="qty-ctrl">'
            + '<button class="qty-btn" data-pid="' + esc(p.id) + '" data-size="' + esc(sz) + '" data-delta="-1">−</button>'
            + '<div class="qty-display' + (q>0?' active':'') + '" id="qd_' + p.id + '_' + sz.replace(/[^a-zA-Z0-9]/g,'_') + '">' + q + '</div>'
            + '<button class="qty-btn" data-pid="' + esc(p.id) + '" data-size="' + esc(sz) + '" data-delta="1">+</button>'
            + '</div></div>';
        }).join('')
      : '<div class="size-row">'
        + '<span class="size-label">Quantité</span>'
        + '<div class="qty-ctrl">'
        + '<button class="qty-btn" data-pid="' + esc(p.id) + '" data-size="" data-delta="-1">−</button>'
        + '<div class="qty-display' + (cart[key0]&&cart[key0].qty>0?' active':'') + '" id="qd_' + p.id + '_">' + (cart[key0]?cart[key0].qty:0) + '</div>'
        + '<button class="qty-btn" data-pid="' + esc(p.id) + '" data-size="" data-delta="1">+</button>'
        + '</div></div>';

    return '<div class="product-card">'
      + imgHtml
      + '<div class="product-header">'
      + (p.collection_name ? '<div class="product-collection">' + esc(p.collection_name) + '</div>' : '')
      + '<div class="product-ref">' + esc(p.reference) + '</div>'
      + (p.description ? '<div class="product-desc">' + esc(p.description) + '</div>' : '')
      + '<div class="product-tags">'
      + (p.color ? '<span class="tag">🎨 ' + esc(p.color) + '</span>' : '')
      + (p.composition ? '<span class="tag">🧵 ' + esc(p.composition) + '</span>' : '')
      + (p.price > 0 ? '<span class="tag tag-price">Wholesale ' + Number(p.price).toFixed(2) + ' €</span>' : '')
      + (p.price_retail > 0 ? '<span class="tag" style="background:#2a2a3a;color:#aaa">Retail ' + Number(p.price_retail).toFixed(2) + ' €</span>' : '')
      + '</div></div>'
      + '<div class="size-rows">' + sizeRowsHtml + '</div>'
      + '</div>';
  }).join('');
}

// ── Event delegation (works on mobile) ───────────────
document.getElementById('products-container').addEventListener('click', function(e) {
  // Image carousel
  const img = e.target.closest('.product-img');
  if (img && img.dataset.images) { openCarousel(JSON.parse(img.dataset.images), 0); return; }

  // Color variant switch
  const cbtn = e.target.closest('.color-btn');
  if (cbtn) {
    const pid = cbtn.dataset.pid;
    const vi = parseInt(cbtn.dataset.vi);
    const wrap = document.getElementById('vcolors_' + pid);
    const variants = JSON.parse(wrap.dataset.variants);
    const v = variants[vi];
    const vImgs = v.images && v.images.length ? v.images : [];
    // update active button
    wrap.querySelectorAll('.color-btn').forEach((b, i) => {
      b.classList.toggle('active', i === vi);
      b.style.borderColor = i === vi ? '#6c63ff' : '';
      b.style.color = i === vi ? '#6c63ff' : '';
    });
    // update image
    const pimg = document.getElementById('pimg_' + pid);
    const badge = document.getElementById('pimgbadge_' + pid);
    if (pimg) {
      if (vImgs.length) {
        pimg.src = vImgs[0];
        pimg.dataset.images = JSON.stringify(vImgs);
        pimg.style.display = '';
      } else {
        pimg.style.display = 'none';
      }
    }
    if (badge) {
      if (vImgs.length > 1) { badge.textContent = vImgs.length + ' 📷'; badge.style.display = ''; }
      else { badge.style.display = 'none'; }
    }
    return;
  }

  // Qty buttons
  const btn = e.target.closest('.qty-btn');
  if (!btn) return;
  const pid = btn.dataset.pid;
  const size = btn.dataset.size;
  const delta = parseInt(btn.dataset.delta);
  changeQty(pid, size, delta);
});

function changeQty(pid, size, delta) {
  const k = pid + '|' + size;
  const current = cart[k] ? cart[k].qty : 0;
  const newQty = Math.max(0, current + delta);
  const product = productsData.find(p => p.id === pid);
  if (!product) return;

  if (newQty > 0) {
    cart[k] = { product, size, qty: newQty };
  } else {
    delete cart[k];
  }

  // Update display
  const displayId = 'qd_' + pid + '_' + size.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById(displayId);
  if (el) {
    el.textContent = newQty;
    el.classList.toggle('active', newQty > 0);
  }

  updateCartBar();
}

function updateCartBar() {
  const items = Object.values(cart);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const totalPrice = items.reduce((s, i) => s + i.qty * parseFloat(i.product.price || 0), 0);
  document.getElementById('cart-count').textContent = totalQty + ' article(s)';
  document.getElementById('cart-total').textContent = totalPrice.toFixed(2).replace('.', ',') + ' €';
  document.getElementById('btn-next').disabled = totalQty === 0;
}

// ── Search ────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const filtered = q ? productsData.filter(p =>
    (p.reference||'').toLowerCase().includes(q) ||
    (p.description||'').toLowerCase().includes(q) ||
    (p.color||'').toLowerCase().includes(q) ||
    (p.collection_name||'').toLowerCase().includes(q)
  ) : productsData;
  renderProducts(filtered);
});

// ── Navigation ────────────────────────────────────────
function goToPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  for (let i = 1; i <= 3; i++) {
    const s = document.getElementById('step' + i);
    s.classList.remove('active', 'done');
    if (i < n) s.classList.add('done');
    if (i === n) s.classList.add('active');
  }
  const pageEl = n <= 3 ? document.getElementById('page' + n) : document.getElementById('page-success');
  pageEl.classList.add('active');
  document.getElementById('cart-bar').style.display = (n >= 1 && n <= 3) ? 'flex' : 'none';
  if (n === 3) {
    renderRecap();
    document.getElementById('btn-next').textContent = 'Confirmer →';
  } else if (n === 2) {
    document.getElementById('btn-next').textContent = 'Récapitulatif →';
  } else if (n === 1) {
    document.getElementById('btn-next').textContent = 'Suivant →';
    updateCartBar();
  }
  currentPage = n;
  window.scrollTo(0, 0);
}

document.getElementById('btn-next').addEventListener('click', function() {
  if (currentPage === 1) {
    if (Object.keys(cart).length === 0) return;
    goToPage(2);
  } else if (currentPage === 2) {
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    if (!name || !email) { alert('Nom et email requis.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('Email invalide.'); return; }
    goToPage(3);
  } else if (currentPage === 3) {
    submitOrder();
  }
});

document.getElementById('back-to-1').addEventListener('click', () => goToPage(1));
document.getElementById('back-to-2').addEventListener('click', () => goToPage(2));

// ── Recap ─────────────────────────────────────────────
function renderRecap() {
  const lines = Object.values(cart);
  const total = lines.reduce((s, l) => s + l.qty * parseFloat(l.product.price || 0), 0);

  document.getElementById('recap-lines').innerHTML = lines.length
    ? lines.map(l => '<div class="recap-line">'
        + '<div><div>' + esc(l.product.reference) + (l.size ? ' — ' + esc(l.size) : '') + '</div>'
        + '<div class="recap-sub">' + l.qty + ' × ' + Number(l.product.price||0).toFixed(2) + ' €</div></div>'
        + '<div class="recap-price">' + (l.qty * parseFloat(l.product.price||0)).toFixed(2) + ' €</div>'
        + '</div>').join('')
    : '<div style="color:#aaa;font-size:13px">Aucun article.</div>';

  document.getElementById('recap-total').textContent = total.toFixed(2).replace('.', ',') + ' €';

  const name = document.getElementById('c-name').value;
  const email = document.getElementById('c-email').value;
  const company = document.getElementById('c-company').value;
  const phone = document.getElementById('c-phone').value;
  document.getElementById('client-recap').innerHTML = '<h4>Client</h4>'
    + '<div class="recap-line"><span>Nom</span><strong>' + esc(name) + '</strong></div>'
    + '<div class="recap-line"><span>Email</span><strong>' + esc(email) + '</strong></div>'
    + (company ? '<div class="recap-line"><span>Société</span><strong>' + esc(company) + '</strong></div>' : '')
    + (phone ? '<div class="recap-line"><span>Tél.</span><strong>' + esc(phone) + '</strong></div>' : '');
}

// ── Submit ────────────────────────────────────────────
async function submitOrder() {
  const btn = document.getElementById('btn-next');
  btn.disabled = true;
  btn.textContent = 'Envoi…';

  const lines = Object.values(cart).map(l => ({
    product_id: l.product.id,
    size: l.size,
    quantity: l.qty
  }));

  const body = {
    brand_id: brandId,
    client_name: document.getElementById('c-name').value.trim(),
    client_email: document.getElementById('c-email').value.trim(),
    client_company: document.getElementById('c-company').value.trim(),
    client_phone: document.getElementById('c-phone').value.trim(),
    notes: document.getElementById('c-notes').value.trim(),
    lines
  };

  try {
    const r = await fetch('/api/public/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (data.ok) {
      document.getElementById('cart-bar').style.display = 'none';
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.step').forEach(s => s.classList.add('done'));
      document.getElementById('page-success').classList.add('active');
      document.getElementById('success-email-msg').textContent = 'Un PDF a été envoyé à ' + body.client_email;
    } else {
      alert(data.error || 'Erreur lors de la commande');
      btn.disabled = false;
      btn.textContent = 'Confirmer →';
    }
  } catch(e) {
    alert('Erreur réseau. Vérifiez votre connexion.');
    btn.disabled = false;
    btn.textContent = 'Confirmer →';
  }
}

// ── Carousel lightbox ─────────────────────────────────
let carouselImgs = [], carouselIdx = 0;
let touchStartX = 0;

function openCarousel(imgs, idx) {
  carouselImgs = imgs;
  carouselIdx = idx;
  document.getElementById('img-modal').classList.add('open');
  renderCarousel();
}

function renderCarousel() {
  const src = carouselImgs[carouselIdx];
  document.getElementById('img-modal-src').src = src;
  const n = carouselImgs.length;
  document.getElementById('img-prev').style.display = n > 1 ? 'flex' : 'none';
  document.getElementById('img-next').style.display = n > 1 ? 'flex' : 'none';
  document.getElementById('img-counter').textContent = n > 1 ? (carouselIdx + 1) + ' / ' + n : '';
  const dots = document.getElementById('img-dots');
  dots.innerHTML = n > 1 ? carouselImgs.map((_, i) =>
    '<button class="img-dot' + (i === carouselIdx ? ' active' : '') + '" data-i="' + i + '"></button>'
  ).join('') : '';
}

function carouselGo(delta) {
  carouselIdx = (carouselIdx + delta + carouselImgs.length) % carouselImgs.length;
  renderCarousel();
}

document.getElementById('img-close').addEventListener('click', closeCarousel);
document.getElementById('img-prev').addEventListener('click', () => carouselGo(-1));
document.getElementById('img-next').addEventListener('click', () => carouselGo(1));
document.getElementById('img-dots').addEventListener('click', e => {
  const btn = e.target.closest('.img-dot');
  if (btn) { carouselIdx = parseInt(btn.dataset.i); renderCarousel(); }
});
document.getElementById('img-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCarousel();
});

// Swipe support
document.getElementById('img-modal').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('img-modal').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) carouselGo(dx < 0 ? 1 : -1);
}, { passive: true });

// Arrow keys
document.addEventListener('keydown', e => {
  if (!document.getElementById('img-modal').classList.contains('open')) return;
  if (e.key === 'ArrowRight') carouselGo(1);
  if (e.key === 'ArrowLeft') carouselGo(-1);
  if (e.key === 'Escape') closeCarousel();
});

function closeCarousel() {
  document.getElementById('img-modal').classList.remove('open');
  document.getElementById('img-modal-src').src = '';
}

init();
</script>
