<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portail Acheteur — Editions Standard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#0a0a0a; --dark:#111; --mid:#1c1c1c; --border:#252525; --muted:#777; --soft:#bbb; --white:#f5f4f0; --accent:#CCEB3C;
    --dot:'DotGothic16','Space Mono',monospace;
  }
  [data-theme="light"] {
    --black:#f5f4f0; --dark:#fff; --mid:#eee; --border:#ddd; --muted:#888; --soft:#444; --white:#111; --accent:#6b8500;
  }
  [data-theme="light"] .cart-bar { background: #111; color: #fff; }
  [data-theme="light"] .cart-bar button { background: #CCEB3C; color: #111; }
  [data-theme="light"] #sig-canvas { background: #fafafa; border: 1px solid var(--border); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Space Mono', 'Courier New', monospace; background: var(--black); color: var(--white); min-height: 100vh; padding-bottom: 90px; transition: background .2s, color .2s; }
  .header { background: var(--black); border-bottom: 1px solid var(--border); padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-left img { width: 36px; height: 36px; border-radius: 6px; display: block; }
  .header h1 { font-family: var(--dot), monospace; font-size: 22px; font-weight: 400; }
  .header .nav { display: flex; gap: 22px; align-items: center; font-family: 'Inter', sans-serif; font-size: 13px; }
  .header .nav a { color: var(--soft); text-decoration: none; cursor: pointer; letter-spacing: .04em; }
  .header .nav a.active { color: var(--accent); font-weight: 600; }
  .header .nav a.nav-home { padding-left: 22px; border-left: 1px solid var(--border); }
  /* ── User dropdown ── */
  .user-menu { position: relative; flex-shrink: 0; }
  .user-btn { display: flex; align-items: center; gap: 9px; background: var(--accent); border: none; border-radius: 24px; padding: 6px 14px 6px 6px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; color: #111; font-weight: 600; transition: opacity .15s; user-select: none; }
  .user-btn:hover { opacity: .85; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #111; color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .user-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-chevron { font-size: 9px; opacity: .6; transition: transform .2s; }
  .user-menu.open .user-chevron { transform: rotate(180deg); }
  .user-dropdown { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: var(--dark); border: 1px solid var(--border); border-radius: 8px; min-width: 220px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.5); z-index: 300; }
  .user-menu.open .user-dropdown { display: block; }
  .user-dropdown-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .user-dropdown-header .uname { font-size: 13px; font-weight: 600; color: var(--white); }
  .user-dropdown-header .uemail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .user-dropdown-header .ucompany { font-size: 12px; color: var(--soft); }
  .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--soft); cursor: pointer; text-decoration: none; transition: background .1s, color .1s; border: none; background: none; width: 100%; text-align: left; }
  .dropdown-item:hover { background: var(--border); color: var(--white); }
  .dropdown-item.danger { color: #e74c3c; }
  .dropdown-item.danger:hover { background: #e74c3c; color: #fff; }
  .dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }
  /* ── Profile form ── */
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .profile-grid .field-full { grid-column: 1 / -1; }
  @media (max-width: 640px) { .profile-grid { grid-template-columns: 1fr; } .user-name { display: none; } }
  .wrap { width: 100%; padding: 36px 40px 60px; }
  h2.section-title { font-family: var(--dot), monospace; font-size: 26px; margin-bottom: 24px; font-weight: 400; }
  .brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; }
  .brand-card { background: var(--dark); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .15s; }
  .brand-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .brand-cover { width: 100%; height: 200px; object-fit: cover; display: block; background: #1a1a1a; }
  .brand-cover-ph { width: 100%; height: 200px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 40px; opacity: .3; }
  .brand-info { padding: 18px 20px; }
  .brand-name { font-family: var(--dot), monospace; font-size: 19px; }
  .back-btn { background: none; border: none; color: var(--soft); font-size: 13px; cursor: pointer; margin-bottom: 20px; font-family: 'Inter', sans-serif; letter-spacing: .06em; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
  .brand-banner { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 32px; }
  .brand-banner-cover { width: 100%; height: 260px; object-fit: cover; display: block; }
  .brand-banner-info { padding: 24px 28px; }
  .brand-banner-about { font-family: 'Inter', sans-serif; font-size: 14px; color: var(--soft); line-height: 1.7; max-width: 700px; margin-bottom: 14px; }
  .brand-banner-moq { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--accent); background: rgba(204,235,60,.08); display: inline-block; padding: 8px 14px; border-radius: 4px; margin-bottom: 14px; }
  .brand-banner-cgv summary { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--soft); cursor: pointer; text-decoration: underline; letter-spacing: .02em; }
  .brand-banner-cgv p { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); line-height: 1.7; margin-top: 10px; max-width: 700px; }
  .search-bar { margin-bottom: 14px; max-width: 420px; }
  .search-bar input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
  .search-bar input:focus { border-color: var(--accent); }
  .collection-filters { display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .col-filter { display: inline-block; padding: 7px 16px; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; border: 1px solid var(--border); color: var(--muted); cursor: pointer; background: transparent; font-family: 'Space Mono', monospace; border-radius: 20px; transition: border-color .15s, color .15s; }
  .col-filter.active { border-color: var(--accent); color: var(--accent); }
  .product-card { background: var(--dark); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .product-img { width: 100%; height: 280px; object-fit: cover; background: #1a1a1a; display: block; }
  .product-info { padding: 18px 20px; }
  .product-ref { font-family: var(--dot), monospace; font-size: 17px; }
  .product-desc { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--soft); margin-top: 6px; line-height: 1.6; }
  .product-meta { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); margin-top: 6px; }
  .product-price { font-size: 16px; color: var(--accent); margin-top: 10px; font-weight: 700; font-family: var(--dot), monospace; }
  .qty-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .qty-btn { width: 32px; height: 32px; background: var(--black); border: 1px solid var(--border); color: var(--white); cursor: pointer; font-size: 16px; border-radius: 4px; }
  .qty-display { min-width: 28px; text-align: center; font-size: 15px; font-weight: 700; }
  .qty-display.active { color: var(--accent); }
  .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--accent); color: var(--black); padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 60; }
  .cart-bar strong { font-family: var(--dot), monospace; font-size: 20px; }
  .cart-bar button { background: var(--black); color: var(--white); border: none; padding: 13px 24px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; cursor: pointer; border-radius: 4px; font-family: 'Space Mono', monospace; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 7px; font-family: 'Inter', sans-serif; }
  .field input, .field select, .field textarea { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; color: var(--white); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .cgv-box { background: var(--dark); border: 1px dotted var(--border); border-radius: 4px; padding: 16px; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--soft); line-height: 1.7; margin-bottom: 12px; max-height: 160px; overflow-y: auto; }
  .cgv-box h4 { font-family: var(--dot), monospace; font-size: 14px; color: var(--white); margin-bottom: 8px; font-weight: 400; }
  .checkbox-row { display: flex; align-items: flex-start; gap: 10px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--soft); margin: 18px 0; }
  #sig-canvas { background: #fff; border-radius: 4px; width: 100%; height: 150px; touch-action: none; cursor: crosshair; }
  .btn-confirm { width: 100%; background: var(--accent); color: var(--black); border: none; padding: 18px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: .1em; text-transform: uppercase; border-radius: 4px; font-family: 'Space Mono', monospace; margin-top: 18px; max-width: 480px; }
  .btn-confirm:disabled { opacity: .4; cursor: default; }
  .checkout-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 40px; align-items: start; }
  @media (max-width: 900px) { .checkout-layout { grid-template-columns: 1fr; } }
  .order-card { background: var(--dark); border: 1px solid var(--border); border-radius: 6px; padding: 20px 22px; margin-bottom: 14px; }
  .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .order-status { display: inline-block; font-size: 10px; padding: 4px 12px; border-radius: 10px; text-transform: uppercase; letter-spacing: .08em; font-family: 'Space Mono', monospace; margin-top: 8px; }
  .order-status.confirmed { background: rgba(204,235,60,.12); color: var(--accent); }
  .order-status.validated { background: #1f3d1f; color: #5ec95e; }
  .order-status.cancelled { background: #2a2a2a; color: var(--muted); }
  .loader { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .success-check { width:72px; height:72px; border-radius:50%; background:rgba(204,235,60,.1); border:2px dotted var(--accent); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:28px; color:var(--accent); }
  .msg { font-family: 'Inter', sans-serif; font-size: 14px; color: var(--soft); line-height: 1.7; padding: 16px; background: var(--dark); border-radius: 4px; margin-top: 14px; }
  .msg.error { color: var(--accent); }
  .product-img { cursor: zoom-in; }
  .img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.97); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
  .img-modal.open { display: flex; }
  .img-modal-main { position: relative; display: flex; align-items: center; justify-content: center; width: 100vw; flex: 1; }
  .img-modal-main img { max-width: 92vw; max-height: 82vh; object-fit: contain; user-select: none; }
  .img-close { position: absolute; top: 16px; right: 16px; color: var(--soft); font-size: 28px; background: none; border: none; cursor: pointer; line-height: 1; padding: 10px; z-index: 10; font-family: 'Inter', sans-serif; font-weight: 300; }
  .img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--soft); font-size: 40px; width: 56px; height: 80px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 200; }
  .img-nav:active { color: #fff; }
  .img-nav-prev { left: 4px; }
  .img-nav-next { right: 4px; }
  .img-dots { display: flex; gap: 8px; padding: 16px 0 8px; }
  .img-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); border: none; cursor: pointer; padding: 0; transition: background .2s; }
  .img-dot.active { background: var(--accent); }
  .img-counter { color: var(--muted); font-size: 10px; padding-bottom: 10px; letter-spacing: .12em; font-family: 'Inter', sans-serif; }

  /* ── Responsive: tablet ── */
  @media (max-width: 1024px) {
    .wrap { padding: 28px 24px 80px; }
    .header { padding: 16px 24px; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  }

  /* ── Responsive: mobile ── */
  @media (max-width: 640px) {
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; row-gap: 8px; }
    .header-left img { width: 30px; height: 30px; }
    .header h1 { font-size: 18px; }
    .header .nav { gap: 10px; font-size: 12px; flex-wrap: wrap; row-gap: 6px; }
    .header .nav a.nav-home { padding-left: 10px; border-left: none; }
    #currency-select { padding: 4px 8px; font-size: 11px; }
    .wrap { padding: 18px 14px 90px; }
    h2.section-title { font-size: 21px; margin-bottom: 16px; }
    .brand-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .brand-cover, .brand-cover-ph { height: 130px; }
    .brand-info { padding: 12px 14px; }
    .brand-name { font-size: 15px; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .product-img { height: 190px; }
    .product-info { padding: 12px 14px; }
    .product-ref { font-size: 14px; }
    .product-desc { font-size: 12px; }
    .qty-btn { width: 30px; height: 30px; }
    .brand-banner-cover { height: 150px; }
    .brand-banner-info { padding: 16px 18px; }
    .search-bar { max-width: 100%; }
    .cart-bar { padding: 12px 16px; }
    .cart-bar strong { font-size: 16px; }
    .cart-bar button { padding: 10px 16px; font-size: 11px; }
    .orders-grid { grid-template-columns: 1fr; }
    #sig-canvas { height: 120px; }
    .img-nav { width: 44px; height: 64px; font-size: 30px; }
  }
</style>
<script>
// Auto clair/sombre selon l'heure (7h-19h = clair, sinon sombre) — exécuté avant le rendu pour éviter le flash
(function() {
  function getTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
    const h = new Date().getHours();
    return (h >= 7 && h < 19) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a href="/" title="Retour à l'accueil"><img src="/logo.svg" alt="Editions Standard"></a>
    <h1>Showroom</h1>
  </div>
  <div class="nav">
    <select id="currency-select" onchange="changeCurrency(this.value)" style="display:none;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 10px;cursor:pointer;color:var(--soft);font-size:12px;font-weight:700;font-family:'Inter',sans-serif"></select>
    <a id="nav-catalog" class="active" onclick="showView('catalog')">Catalogue</a>
    <a id="nav-orders" onclick="showView('orders')">Mes commandes</a>
  </div>
  <div class="user-menu" id="user-menu">
    <div class="user-btn" onclick="toggleUserMenu()">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name">Mon espace</span>
      <span class="user-chevron">▼</span>
    </div>
    <div class="user-dropdown">
      <div class="user-dropdown-header">
        <div class="uname" id="dd-name">—</div>
        <div class="uemail" id="dd-email">—</div>
        <div class="ucompany" id="dd-company"></div>
      </div>
      <button class="dropdown-item" onclick="closeUserMenu();showView('catalog')">🏷 Catalogue</button>
      <button class="dropdown-item" onclick="closeUserMenu();showView('orders')">📋 Mes commandes</button>
      <button class="dropdown-item" onclick="closeUserMenu();showView('account')">✏️ Mon profil</button>
      <div class="dropdown-sep"></div>
      <a class="dropdown-item danger" href="/portal-logout">⏻ Déconnexion</a>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="view-catalog">
    <div id="brand-picker"></div>
    <div id="brand-products" style="display:none"></div>
  </div>

  <div id="view-cart" style="display:none">
    <button class="back-btn" onclick="showView('catalog')">← Retour au catalogue</button>
    <h2 class="section-title">Ma sélection</h2>
    <div class="checkout-layout">
      <div id="cart-lines"></div>
      <div id="checkout-form">
        <div class="field"><label>Nom complet *</label><input id="ck-name"></div>
        <div class="field"><label>Société</label><input id="ck-company"></div>
        <div class="field"><label>Téléphone</label><input id="ck-phone"></div>
        <div class="field"><label>Pays</label><input id="ck-country"></div>
        <div id="cgv-blocks"></div>
        <div class="checkbox-row">
          <input type="checkbox" id="ck-cgv" style="margin-top:2px">
          <label for="ck-cgv">J'ai lu et j'accepte les conditions générales de vente de chaque marque sélectionnée. Je comprends que cette commande sera approuvée et finalisée selon les critères propres à chaque marque.</label>
        </div>
        <canvas id="sig-canvas"></canvas>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Signature</span>
          <a onclick="clearSig()" style="font-family:'Inter',sans-serif;font-size:11px;color:var(--soft);cursor:pointer;text-decoration:underline">Effacer</a>
        </div>
        <button class="btn-confirm" id="btn-confirm-order" onclick="submitCheckout()">Valider ma sélection</button>
        <div id="checkout-msg"></div>
      </div>
    </div>
  </div>

  <div id="view-orders" style="display:none">
    <h2 class="section-title">Mes commandes</h2>
    <div id="orders-list" class="loader">Chargement…</div>
  </div>

  <div id="view-account" style="display:none;max-width:680px">
    <h2 class="section-title">Mon profil</h2>

    <div class="card" style="background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:24px">
      <h3 style="font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--white);margin-bottom:20px;letter-spacing:.04em;text-transform:uppercase">Informations personnelles</h3>
      <div class="profile-grid">
        <div class="field">
          <label>Prénom / Nom *</label>
          <input id="prof-name" type="text" placeholder="Jean Dupont">
        </div>
        <div class="field">
          <label>Entreprise / Boutique</label>
          <input id="prof-company" type="text" placeholder="Ma Boutique SARL">
        </div>
        <div class="field">
          <label>Email</label>
          <input id="prof-email" type="email" disabled style="opacity:.5;cursor:not-allowed">
        </div>
        <div class="field">
          <label>Téléphone</label>
          <input id="prof-phone" type="tel" placeholder="+33 6 00 00 00 00">
        </div>
        <div class="field field-full">
          <label>Pays</label>
          <input id="prof-country" type="text" placeholder="France">
        </div>
      </div>
      <button class="btn-confirm" onclick="saveProfile()">Enregistrer les modifications</button>
      <div id="prof-msg" style="margin-top:12px;font-family:'Inter',sans-serif;font-size:13px"></div>
    </div>

    <div class="card" style="background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:24px">
      <h3 style="font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--white);margin-bottom:20px;letter-spacing:.04em;text-transform:uppercase">Changer le mot de passe</h3>
      <div class="profile-grid">
        <div class="field">
          <label>Mot de passe actuel</label>
          <input id="pw-current" type="password" placeholder="••••••••">
        </div>
        <div class="field">
          <label>Nouveau mot de passe</label>
          <input id="pw-new" type="password" placeholder="••••••••">
        </div>
      </div>
      <button class="btn-confirm" onclick="changePassword()">Changer le mot de passe</button>
      <div id="pw-msg" style="margin-top:12px;font-family:'Inter',sans-serif;font-size:13px"></div>
    </div>
  </div>

  <div id="view-success" style="display:none;text-align:center;padding:60px 0;max-width:560px;margin:0 auto">
    <div class="success-check">✓</div>
    <h2 class="section-title" style="text-align:center">Sélection confirmée</h2>
    <div id="success-detail" class="msg" style="text-align:left"></div>
    <button class="btn-confirm" onclick="location.reload()">Retour au catalogue</button>
  </div>
</div>

<!-- Carousel lightbox -->
<div class="img-modal" id="img-modal">
  <button class="img-close" id="img-close">✕</button>
  <div class="img-modal-main">
    <button class="img-nav img-nav-prev" id="img-prev">‹</button>
    <img id="img-modal-src" src="" alt="">
    <button class="img-nav img-nav-next" id="img-next">›</button>
  </div>
  <div class="img-dots" id="img-dots"></div>
  <div class="img-counter" id="img-counter"></div>
</div>

<div class="cart-bar" id="cart-bar" style="display:none">
  <div>
    <strong id="cart-total">0,00 €</strong>
    <div style="font-size:11px;font-family:'Inter',sans-serif">— <span id="cart-count">0</span> article(s)</div>
  </div>
  <button onclick="showView('cart')">Voir ma sélection →</button>
</div>

<script>
let me = null;
let allBrands = [];
let currentBrand = null;
let currentProducts = [];
let CART_KEY = 'portal_cart';
let currenciesData = [{ code: 'EUR', symbol: '€', rate: 1 }];
let selectedCurrency = currenciesData[0];
const cart = {}; // key: brandId|productId|size -> {brand_id, brand_name, product_id, reference, description, color, size, qty, price}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('open'); }
function closeUserMenu() { document.getElementById('user-menu').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!document.getElementById('user-menu').contains(e.target)) closeUserMenu();
});

function fmtPrice(amountEur) {
  const converted = parseFloat(amountEur || 0) * (selectedCurrency.rate || 1);
  return converted.toFixed(2) + ' ' + selectedCurrency.symbol;
}

function changeCurrency(code) {
  selectedCurrency = currenciesData.find(c => c.code === code) || currenciesData[0];
  if (currentBrand) applyProductFilters();
  if (document.getElementById('view-cart').style.display !== 'none') renderCart();
  updateCartBar();
}

function saveCart() {
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function restoreCart() {
  try {
    const saved = JSON.parse(localStorage.getItem(CART_KEY) || '{}');
    Object.entries(saved).forEach(([k, v]) => { if (v.qty > 0) cart[k] = v; });
  } catch(e) {}
}

function sentenceCase(s) {
  s = String(s||'');
  if (!s) return s;
  const letters = s.replace(/[^a-zA-Z]/g, '');
  const upperRatio = letters.length ? (letters.replace(/[^A-Z]/g,'').length / letters.length) : 0;
  if (upperRatio < 0.7) return s;
  return s.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
}

async function init() {
  me = await fetch('/api/portal/me').then(r => r.json());
  CART_KEY = 'portal_cart_' + (me.email || 'default');
  restoreCart();
  // Populate user menu
  const initials = (me.name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = me.name || 'Mon espace';
  document.getElementById('dd-name').textContent = me.name || '';
  document.getElementById('dd-email').textContent = me.email || '';
  document.getElementById('dd-company').textContent = me.company || '';
  allBrands = await fetch('/api/portal/brands').then(r => r.json());
  renderBrandPicker();
  updateCartBar();

  const currencies = await fetch('/api/portal/currencies').then(r => r.json());
  if (currencies && currencies.length) {
    currenciesData = currencies;
    selectedCurrency = currenciesData[0];
    if (currenciesData.length > 1) {
      const sel = document.getElementById('currency-select');
      sel.style.display = '';
      sel.innerHTML = currenciesData.map(c => `<option value="${c.code}">${c.code} ${c.symbol}</option>`).join('');
    }
  }
}

function showView(view) {
  document.getElementById('view-catalog').style.display = view === 'catalog' ? 'block' : 'none';
  document.getElementById('view-cart').style.display = view === 'cart' ? 'block' : 'none';
  document.getElementById('view-orders').style.display = view === 'orders' ? 'block' : 'none';
  document.getElementById('view-account').style.display = view === 'account' ? 'block' : 'none';
  document.getElementById('view-success').style.display = 'none';
  document.getElementById('nav-catalog').classList.toggle('active', view === 'catalog');
  document.getElementById('nav-orders').classList.toggle('active', view === 'orders');
  document.getElementById('cart-bar').style.display = (view === 'catalog' && Object.keys(cart).length) ? 'flex' : (view === 'cart' ? 'none' : document.getElementById('cart-bar').style.display);
  if (view === 'cart') renderCart();
  if (view === 'orders') loadOrders();
  if (view === 'catalog') updateCartBar();
  if (view === 'account') fillProfileForm();
}

function fillProfileForm() {
  document.getElementById('prof-name').value = me.name || '';
  document.getElementById('prof-company').value = me.company || '';
  document.getElementById('prof-email').value = me.email || '';
  document.getElementById('prof-phone').value = me.phone || '';
  document.getElementById('prof-country').value = me.country || '';
  document.getElementById('prof-msg').textContent = '';
  document.getElementById('pw-msg').textContent = '';
}

async function saveProfile() {
  const name = document.getElementById('prof-name').value.trim();
  const company = document.getElementById('prof-company').value.trim();
  const phone = document.getElementById('prof-phone').value.trim();
  const country = document.getElementById('prof-country').value.trim();
  const msg = document.getElementById('prof-msg');
  if (!name) { msg.innerHTML = '<span style="color:#e74c3c">Le nom est requis.</span>'; return; }
  const r = await fetch('/api/portal/update-profile', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, company, phone, country })
  }).then(r => r.json());
  if (r.error) { msg.innerHTML = `<span style="color:#e74c3c">${r.error}</span>`; return; }
  me = { ...me, name, company, phone, country };
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-avatar').textContent = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('dd-name').textContent = name;
  document.getElementById('dd-company').textContent = company;
  msg.innerHTML = '<span style="color:var(--accent)">Profil mis à jour ✓</span>';
}

async function changePassword() {
  const currentPassword = document.getElementById('pw-current').value;
  const newPassword = document.getElementById('pw-new').value;
  const msg = document.getElementById('pw-msg');
  if (!currentPassword || !newPassword) { msg.innerHTML = '<div class="msg error">Tous les champs sont requis.</div>'; return; }
  const r = await fetch('/api/portal/change-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ currentPassword, newPassword })
  }).then(r => r.json());
  if (r.error) { msg.innerHTML = `<div class="msg error">${r.error}</div>`; return; }
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  msg.innerHTML = '<div class="msg">Mot de passe mis à jour ✓</div>';
}

function renderBrandPicker() {
  const el = document.getElementById('brand-picker');
  el.innerHTML = '<div class="brand-grid">' + allBrands.map(b => {
    const cover = b.cover_image ? `<img class="brand-cover" src="${esc(b.cover_image)}">` : `<div class="brand-cover-ph">🏷️</div>`;
    return `<div class="brand-card" onclick="openBrand('${b.id}')">${cover}<div class="brand-info"><div class="brand-name">${esc(b.name)}</div></div></div>`;
  }).join('') + '</div>';
}

async function openBrand(brandId) {
  const data = await fetch(`/api/portal/brands/${brandId}/products`).then(r => r.json());
  if (data.error) { alert(data.error); return; }
  currentBrand = data.brand;
  currentProducts = data.products;
  document.getElementById('brand-picker').style.display = 'none';
  const container = document.getElementById('brand-products');
  container.style.display = 'block';

  const moqParts = [];
  if (parseInt(currentBrand.moq_qty) > 0) moqParts.push(`Minimum ${currentBrand.moq_qty} pièces`);
  if (parseFloat(currentBrand.moq_amount) > 0) moqParts.push(`Minimum ${Number(currentBrand.moq_amount).toFixed(2)} € HT`);
  const moqHtml = moqParts.length ? `<div class="brand-banner-moq">📦 ${moqParts.join(' — ')}</div>` : '';
  const aboutHtml = currentBrand.about_text ? `<p class="brand-banner-about">${esc(currentBrand.about_text)}</p>` : '';
  const cgvHtml = currentBrand.cgv_text ? `<details class="brand-banner-cgv"><summary>Conditions générales de vente</summary><p>${esc(currentBrand.cgv_text)}</p></details>` : '';
  const coverHtml = currentBrand.cover_image ? `<img class="brand-banner-cover" src="${esc(currentBrand.cover_image)}">` : '';

  container.innerHTML = `<button class="back-btn" onclick="closeBrand()">← Toutes les marques</button>
    <div class="brand-banner">
      ${coverHtml}
      <div class="brand-banner-info">
        <h2 class="section-title" style="margin-bottom:10px">${esc(currentBrand.name)}</h2>
        ${aboutHtml}
        ${moqHtml}
        ${cgvHtml}
      </div>
    </div>
    <div class="search-bar">
      <input id="product-search" type="text" placeholder="Rechercher une référence…" oninput="applyProductFilters()">
    </div>
    <div id="collection-filters" class="collection-filters"></div>
    <div id="category-filters" class="collection-filters"></div>
    <div id="products-list" class="products-grid"></div>`;
  activeCollection = '__all__';
  activeCategory = '__all__';
  buildCollectionFilters(currentProducts);
  buildCategoryFilters(currentProducts);
  applyProductFilters();
}

let activeCollection = '__all__';
let activeCategory = '__all__';

function buildCollectionFilters(products) {
  const collections = ['__all__', ...new Set(products.map(p => p.collection_name).filter(Boolean))];
  const bar = document.getElementById('collection-filters');
  if (collections.length <= 2) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = collections.map(c =>
    `<button class="col-filter${c === activeCollection ? ' active' : ''}" data-col="${esc(c)}">${c === '__all__' ? 'Toutes collections' : esc(c)}</button>`
  ).join('');
  bar.onclick = e => {
    const btn = e.target.closest('.col-filter');
    if (!btn) return;
    activeCollection = btn.dataset.col;
    bar.querySelectorAll('.col-filter').forEach(b => b.classList.toggle('active', b.dataset.col === activeCollection));
    applyProductFilters();
  };
}

function buildCategoryFilters(products) {
  const categories = ['__all__', ...new Set(products.map(p => p.category).filter(Boolean))];
  const bar = document.getElementById('category-filters');
  if (categories.length <= 2) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = categories.map(c =>
    `<button class="col-filter${c === activeCategory ? ' active' : ''}" data-cat="${esc(c)}">${c === '__all__' ? 'Toutes catégories' : esc(c)}</button>`
  ).join('');
  bar.onclick = e => {
    const btn = e.target.closest('.col-filter');
    if (!btn) return;
    activeCategory = btn.dataset.cat;
    bar.querySelectorAll('.col-filter').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCategory));
    applyProductFilters();
  };
}

function applyProductFilters() {
  const q = (document.getElementById('product-search')?.value || '').toLowerCase();
  let filtered = currentProducts;
  if (activeCollection && activeCollection !== '__all__') {
    filtered = filtered.filter(p => p.collection_name === activeCollection);
  }
  if (activeCategory && activeCategory !== '__all__') {
    filtered = filtered.filter(p => p.category === activeCategory);
  }
  if (q) {
    filtered = filtered.filter(p =>
      (p.reference||'').toLowerCase().includes(q) ||
      (p.description||'').toLowerCase().includes(q) ||
      (p.color||'').toLowerCase().includes(q) ||
      (p.collection_name||'').toLowerCase().includes(q) ||
      (p.category||'').toLowerCase().includes(q)
    );
  }
  renderProductsList(filtered);
}

function closeBrand() {
  document.getElementById('brand-picker').style.display = 'block';
  document.getElementById('brand-products').style.display = 'none';
  currentBrand = null;
}

function renderProductsList(products) {
  const list = products || currentProducts;
  const el = document.getElementById('products-list');
  if (!list.length) { el.innerHTML = '<p class="msg">Aucune référence ne correspond.</p>'; return; }
  el.innerHTML = list.map(p => {
    let imgs = [];
    try { imgs = JSON.parse(p.images || '[]'); } catch(e) {}
    if (!imgs.length && p.image_url) imgs = [p.image_url];
    const imgsJson = esc(JSON.stringify(imgs));
    const img = imgs[0]
      ? `<img class="product-img" src="${esc(imgs[0])}" data-images="${imgsJson}" onclick="openCarouselFromEl(this)">`
      : `<div class="product-img"></div>`;
    const sizes = (p.sizes||'').split(',').map(s=>s.trim()).filter(Boolean);
    const key0 = currentBrand.id + '|' + p.id + '|';
    const qtyHtml = sizes.length ? sizes.map(sz => {
      const k = currentBrand.id + '|' + p.id + '|' + sz;
      const q = cart[k] ? cart[k].qty : 0;
      return `<div class="qty-row"><span style="font-size:11px;font-family:'Inter',sans-serif;min-width:30px">${esc(sz)}</span>
        <button class="qty-btn" onclick="changeQty('${p.id}','${sz}',-1)">−</button>
        <span class="qty-display${q>0?' active':''}" id="qd_${p.id}_${sz.replace(/[^a-zA-Z0-9]/g,'_')}">${q}</span>
        <button class="qty-btn" onclick="changeQty('${p.id}','${sz}',1)">+</button></div>`;
    }).join('') : (() => {
      const q = cart[key0] ? cart[key0].qty : 0;
      return `<div class="qty-row"><button class="qty-btn" onclick="changeQty('${p.id}','',-1)">−</button>
        <span class="qty-display${q>0?' active':''}" id="qd_${p.id}_">${q}</span>
        <button class="qty-btn" onclick="changeQty('${p.id}','',1)">+</button></div>`;
    })();
    return `<div class="product-card">
      ${img}
      <div class="product-info">
        <div class="product-ref">${esc(p.reference)}</div>
        <div class="product-desc">${esc(sentenceCase(p.description))}</div>
        <div class="product-meta">${esc(p.color||'')}</div>
        <div class="product-price">${fmtPrice(p.price)}</div>
        ${qtyHtml}
      </div>
    </div>`;
  }).join('');
}

function changeQty(productId, size, delta) {
  const p = currentProducts.find(x => x.id === productId);
  const key = currentBrand.id + '|' + productId + '|' + size;
  if (!cart[key]) cart[key] = { brand_id: currentBrand.id, brand_name: currentBrand.name, product_id: productId, reference: p.reference, description: p.description, color: p.color, size, qty: 0, price: p.price };
  cart[key].qty = Math.max(0, cart[key].qty + delta);
  if (cart[key].qty === 0) delete cart[key];
  const elId = `qd_${productId}_${size.replace(/[^a-zA-Z0-9]/g,'_')}`;
  const el = document.getElementById(elId);
  if (el) { el.textContent = cart[key] ? cart[key].qty : 0; el.classList.toggle('active', !!cart[key] && cart[key].qty > 0); }
  saveCart();
  updateCartBar();
}

function updateCartBar() {
  const items = Object.values(cart);
  const count = items.reduce((s,i) => s + i.qty, 0);
  const total = items.reduce((s,i) => s + i.qty * parseFloat(i.price||0), 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total').textContent = fmtPrice(total);
  document.getElementById('cart-bar').style.display = count > 0 && document.getElementById('view-catalog').style.display !== 'none' ? 'flex' : 'none';
}

function renderCart() {
  document.getElementById('cart-bar').style.display = 'none';
  const items = Object.values(cart);
  const byBrand = {};
  items.forEach(i => { (byBrand[i.brand_id] = byBrand[i.brand_id] || []).push(i); });

let moqBlocked = false;
  const linesHtml = Object.entries(byBrand).map(([brandId, lines]) => {
    const brandTotal = lines.reduce((s,l) => s + l.qty * parseFloat(l.price||0), 0);
    const brandQty = lines.reduce((s,l) => s + l.qty, 0);
    const brand = allBrands.find(b => b.id === brandId);
    const moqQty = parseInt(brand?.moq_qty) || 0;
    const moqAmount = parseFloat(brand?.moq_amount) || 0;
    let moqWarnHtml = '';
    if ((moqQty > 0 && brandQty < moqQty) || (moqAmount > 0 && brandTotal < moqAmount)) {
      moqBlocked = true;
      const parts = [];
      if (moqQty > 0 && brandQty < moqQty) parts.push(`minimum ${moqQty} pièces (actuellement ${brandQty})`);
      if (moqAmount > 0 && brandTotal < moqAmount) parts.push(`minimum ${moqAmount.toFixed(2)} € HT (actuellement ${brandTotal.toFixed(2)} €)`);
      moqWarnHtml = `<div class="msg error" style="margin-top:8px">⚠ ${esc(lines[0].brand_name)} : ${parts.join(' — ')}</div>`;
    }
    return `<div style="margin-bottom:20px">
      <div style="font-family:var(--dot),monospace;font-size:13px;color:var(--accent);margin-bottom:8px">${esc(lines[0].brand_name)}</div>
      ${lines.map(l => `<div style="display:flex;justify-content:space-between;font-size:12px;font-family:'Inter',sans-serif;padding:6px 0;border-bottom:1px solid var(--border)">
        <span>${esc(l.reference)} ${l.size ? '— ' + esc(l.size) : ''} × ${l.qty}</span>
        <span>${fmtPrice(l.qty * parseFloat(l.price||0))}</span>
      </div>`).join('')}
      <div style="text-align:right;font-size:12px;font-weight:700;margin-top:6px">Sous-total : ${fmtPrice(brandTotal)}</div>
      ${moqWarnHtml}
    </div>`;
  }).join('');

  document.getElementById('cart-lines').innerHTML = linesHtml || '<p class="msg">Votre sélection est vide.</p>';
  document.getElementById('btn-confirm-order').disabled = moqBlocked;

  const cgvHtml = Object.entries(byBrand).map(([brandId, lines]) => {
    const brand = allBrands.find(b => b.id === brandId);
    return `<div class="cgv-box"><h4>${esc(lines[0].brand_name)} — CGV</h4>${esc(brand?.cgv_text || 'Conditions générales de vente standard.')}</div>`;
  }).join('');
  document.getElementById('cgv-blocks').innerHTML = cgvHtml;

  if (me) {
    document.getElementById('ck-name').value = me.name || '';
    document.getElementById('ck-company').value = me.company || '';
    document.getElementById('ck-phone').value = me.phone || '';
    document.getElementById('ck-country').value = me.country || '';
  }

  initSigCanvas();
}

// ── Signature ──
let sigCanvas, sigCtx, sigDrawing = false, sigEmpty = true;
function initSigCanvas() {
  sigCanvas = document.getElementById('sig-canvas');
  sigCtx = sigCanvas.getContext('2d');
  const rect = sigCanvas.getBoundingClientRect();
  sigCanvas.width = rect.width || 600;
  sigCanvas.height = 120;
  sigCtx.strokeStyle = '#0a0a0a';
  sigCtx.lineWidth = 2;
  sigCtx.lineCap = 'round';
  sigEmpty = true;

  const getPos = e => {
    const r = sigCanvas.getBoundingClientRect();
    const scaleX = sigCanvas.width / r.width;
    return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleX };
  };
  sigCanvas.onmousedown = e => { sigDrawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
  sigCanvas.onmousemove = e => { if (!sigDrawing) return; const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); sigEmpty = false; };
  sigCanvas.onmouseup = () => { sigDrawing = false; };
  sigCanvas.onmouseleave = () => { sigDrawing = false; };
  sigCanvas.ontouchstart = e => { e.preventDefault(); sigDrawing = true; const p = getPos(e.touches[0]); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
  sigCanvas.ontouchmove = e => { e.preventDefault(); if (!sigDrawing) return; const p = getPos(e.touches[0]); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); sigEmpty = false; };
  sigCanvas.ontouchend = () => { sigDrawing = false; };
}

function clearSig() {
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  sigEmpty = true;
}

async function submitCheckout() {
  const msg = document.getElementById('checkout-msg');
  const client_name = document.getElementById('ck-name').value.trim();
  if (!client_name) { msg.innerHTML = '<div class="msg error">Nom requis.</div>'; return; }
  if (!document.getElementById('ck-cgv').checked) { msg.innerHTML = '<div class="msg error">Veuillez accepter les CGV.</div>'; return; }
  if (sigEmpty) { msg.innerHTML = '<div class="msg error">Signature requise.</div>'; return; }
  if (!Object.keys(cart).length) { msg.innerHTML = '<div class="msg error">Sélection vide.</div>'; return; }

  document.getElementById('btn-confirm-order').disabled = true;
  const lines = Object.values(cart).map(l => ({ brand_id: l.brand_id, product_id: l.product_id, size: l.size, quantity: l.qty }));
  const buyer_signature = sigCanvas.toDataURL('image/png');

  try {
    const r = await fetch('/api/portal/checkout', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lines, client_name,
        client_company: document.getElementById('ck-company').value.trim(),
        client_phone: document.getElementById('ck-phone').value.trim(),
        client_country: document.getElementById('ck-country').value.trim(),
        buyer_signature, cgv_accepted: 1
      })
    }).then(r => r.json());

    if (r.error) { msg.innerHTML = `<div class="msg error">${r.error}</div>`; document.getElementById('btn-confirm-order').disabled = false; return; }

    Object.keys(cart).forEach(k => delete cart[k]);
    saveCart();
    document.getElementById('view-cart').style.display = 'none';
    document.getElementById('view-success').style.display = 'block';
    const brandNames = r.orders.map(o => allBrands.find(b => b.id === o.brand_id)?.name || o.brand_id).join(', ');
    document.getElementById('success-detail').innerHTML =
      `Votre sélection a été transmise pour : <strong>${esc(brandNames)}</strong>.<br><br>
       Vous recevrez un email de confirmation pour chaque marque. Un délai de <strong>7 jours</strong> est nécessaire pour recevoir la version définitive, datée et signée par les deux parties.`;
  } catch(e) {
    msg.innerHTML = '<div class="msg error">Erreur, réessayez.</div>';
    document.getElementById('btn-confirm-order').disabled = false;
  }
}

async function loadOrders() {
  const data = await fetch('/api/portal/orders').then(r => r.json());
  const list = document.getElementById('orders-list');
  if (!data.length) { list.innerHTML = '<p class="msg">Aucune commande pour le moment.</p>'; return; }
  const statusLabel = { confirmed: 'Reçue', validated: 'Validée', cancelled: 'Annulée' };
  list.className = 'orders-grid';
  list.innerHTML = data.map(o => `
    <div class="order-card">
      <div style="font-family:var(--dot),monospace;font-size:15px">${esc(o.brand_name)} — #${o.id.slice(0,8).toUpperCase()}</div>
      <div style="font-family:'Inter',sans-serif;font-size:12px;color:var(--muted);margin-top:3px">${new Date(o.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}</div>
      <div style="font-family:var(--dot),monospace;font-size:19px;color:var(--accent);margin-top:8px">${Number(o.total||0).toFixed(2)} €</div>
      <span class="order-status ${o.status}">${statusLabel[o.status]||o.status}</span><br>
      <a href="/api/portal/orders/${o.id}/pdf" target="_blank" style="font-family:'Inter',sans-serif;font-size:12px;color:var(--soft);text-decoration:underline;display:inline-block;margin-top:10px">📄 Télécharger le PDF</a>
    </div>`).join('');
}

// ── Carousel lightbox ─────────────────────────────────
let carouselImgs = [], carouselIdx = 0;
let touchStartX = 0;

function openCarouselFromEl(el) {
  let imgs = [];
  try { imgs = JSON.parse(el.dataset.images || '[]'); } catch(e) {}
  if (!imgs.length) imgs = [el.src];
  openCarousel(imgs, 0);
}

function openCarousel(imgs, idx) {
  carouselImgs = imgs;
  carouselIdx = idx;
  document.getElementById('img-modal').classList.add('open');
  renderCarousel();
}

function renderCarousel() {
  document.getElementById('img-modal-src').src = carouselImgs[carouselIdx];
  const n = carouselImgs.length;
  document.getElementById('img-prev').style.display = n > 1 ? 'flex' : 'none';
  document.getElementById('img-next').style.display = n > 1 ? 'flex' : 'none';
  document.getElementById('img-counter').textContent = n > 1 ? (carouselIdx + 1) + ' / ' + n : '';
  const dots = document.getElementById('img-dots');
  dots.innerHTML = n > 1 ? carouselImgs.map((_, i) =>
    '<button class="img-dot' + (i === carouselIdx ? ' active' : '') + '" data-i="' + i + '"></button>'
  ).join('') : '';
}

function carouselGo(delta) {
  carouselIdx = (carouselIdx + delta + carouselImgs.length) % carouselImgs.length;
  renderCarousel();
}

function closeCarousel() {
  document.getElementById('img-modal').classList.remove('open');
  document.getElementById('img-modal-src').src = '';
}

document.getElementById('img-close').addEventListener('click', closeCarousel);
document.getElementById('img-prev').addEventListener('click', () => carouselGo(-1));
document.getElementById('img-next').addEventListener('click', () => carouselGo(1));
document.getElementById('img-dots').addEventListener('click', e => {
  const btn = e.target.closest('.img-dot');
  if (btn) { carouselIdx = parseInt(btn.dataset.i); renderCarousel(); }
});
document.getElementById('img-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCarousel();
});
document.getElementById('img-modal').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('img-modal').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) carouselGo(dx < 0 ? 1 : -1);
}, { passive: true });
document.addEventListener('keydown', e => {
  if (!document.getElementById('img-modal').classList.contains('open')) return;
  if (e.key === 'ArrowRight') carouselGo(1);
  if (e.key === 'ArrowLeft') carouselGo(-1);
  if (e.key === 'Escape') closeCarousel();
});

init();
</script>
</body>
</html>
