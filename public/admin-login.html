<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Editions Standard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 380px; }
  .logo-wrap { text-align: center; margin-bottom: 32px; }
  .logo-wrap img { width: 80px; height: 80px; border-radius: 8px; }
  .logo-wrap h1 { font-size: 16px; color: #fff; font-weight: 700; margin-top: 12px; letter-spacing: .5px; }
  .logo-wrap p { color: #555; font-size: 12px; margin-top: 3px; }
  label { display: block; color: #888; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  input { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 15px; outline: none; transition: border-color .2s; }
  input:focus { border-color: #CCEB3C; }
  .btn { width: 100%; background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .error { background: #1a0a0a; border: 1px solid #c0392b33; color: #e74c3c; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.svg" alt="Editions Standard">
    <h1>Editions Standard</h1>
    <p>Showroom — Administration</p>
  </div>
  <form method="POST" action="/admin/login">
    <script>if(location.search.includes('error')) document.write('<div class="error">Mot de passe incorrect.</div>')</script>
    <div style="margin-bottom:16px">
      <label>Mot de passe</label>
      <input type="password" name="password" autofocus placeholder="••••••••">
    </div>
    <button class="btn" type="submit">Connexion</button>
  </form>
</div>
</body>
</html>
