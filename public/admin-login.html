<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editions Standard B2B Showroom — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'DotGothic16','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Space Mono', 'Courier New', monospace; background: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; transition: background .2s, color .2s; }
  .card { background: var(--dark); border: 1px solid var(--border); border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 380px; }
  .logo-wrap { text-align: center; margin-bottom: 32px; }
  .logo-wrap img { width: 64px; height: 64px; border-radius: 8px; }
  .logo-wrap h1 { font-family: var(--dot), monospace; font-size: 18px; color: var(--white); font-weight: 400; margin-top: 14px; letter-spacing: .02em; }
  .logo-wrap p { color: var(--muted); font-size: 11px; margin-top: 4px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: .1em; }
  label { display: block; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-family: 'Inter', sans-serif; }
  input { width: 100%; background: var(--black); border: 1px solid var(--border); border-radius: 2px; padding: 12px 14px; color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--accent); }
  .field { margin-bottom: 16px; }
  .btn { width: 100%; background: var(--accent); color: var(--black); border: none; border-radius: 2px; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .1em; text-transform: uppercase; font-family: 'Space Mono', monospace; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .toggle { text-align: center; margin-top: 18px; }
  .toggle a { color: var(--soft); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Inter', sans-serif; }
  .error { background: #1a0a0a; border: 1px solid #c0392b33; color: #e74c3c; border-radius: 2px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; font-family: 'Inter', sans-serif; }
</style>
<script>
(function() {
  function getTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
    const h = new Date().getHours();
    return (h >= 7 && h < 19) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.svg" alt="Editions Standard">
    <h1>Editions Standard</h1>
    <p>Showroom — Administration</p>
  </div>
  <form method="POST" action="/admin/login">
    <script>if(location.search.includes('error')) document.write('<div class="error">Identifiants incorrects.</div>')</script>
    <div id="email-field" class="field" style="display:none">
      <label>Email</label>
      <input type="email" name="email" id="email-input" placeholder="email@exemple.com" disabled autocomplete="off">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" name="password" autofocus placeholder="••••••••">
    </div>
    <button class="btn" type="submit">Connexion</button>
  </form>
  <div class="toggle">
    <a onclick="toggleMode()" id="toggle-link">Connexion agent / designer →</a>
  </div>
</div>
<script>
function toggleMode() {
  const field = document.getElementById('email-field');
  const input = document.getElementById('email-input');
  const link = document.getElementById('toggle-link');
  const showingEmail = field.style.display === 'block';
  field.style.display = showingEmail ? 'none' : 'block';
  input.disabled = showingEmail;
  if (showingEmail) input.value = '';
  link.textContent = showingEmail ? 'Connexion agent / designer →' : '← Connexion owner';
}
</script>
</body>
</html>
