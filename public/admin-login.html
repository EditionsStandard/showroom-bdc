<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/fonts/brand.css">
<title>Editions Standard B2B Showroom — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"></noscript>
<style>
  /* ── Même langage visuel que le portail acheteur (portal-login.html) :
       carte flottante sans bordure, bouton fantôme, espacement généreux,
       micro-typographie majuscule — voir ce fichier pour le système d'origine. ── */
  :root { --black:#0a0a0a; --ink:#ffffff; --muted:rgba(255,255,255,.55);
    --line:rgba(255,255,255,.38); --line-soft:rgba(255,255,255,.16); --accent:#CCEB3C; --dot:'Plex Mono','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --ink:#111111; --muted:rgba(17,17,17,.55);
    --line:rgba(17,17,17,.45); --line-soft:rgba(17,17,17,.14); --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Plex Mono', 'Space Mono', monospace; color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; background: var(--black); transition: background .2s, color .2s; }
  .card { width: 100%; max-width: 340px; position: relative; }
  .logo-wrap { text-align: center; margin-bottom: 38px; }
  .logo-wrap img { width: 76px; height: 76px; }
  .logo-wrap .kicker { font-size: 9px; letter-spacing: .3em; color: var(--muted); margin-top: 14px; text-transform: uppercase; }
  .logo-wrap h1 { font-size: 12px; color: var(--ink); font-weight: 400; margin-top: 6px; letter-spacing: .3em; text-transform: uppercase; }
  .logo-wrap p { color: var(--muted); font-size: 8.5px; margin-top: 6px; text-transform: uppercase; letter-spacing: .22em; }
  label { display: block; color: var(--muted); font-size: 8.5px; font-weight: 400; text-transform: uppercase; letter-spacing: .26em; margin-bottom: 9px; }
  input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
    border-radius: 0; padding: 6px 1px 10px; color: var(--ink); font-size: 14px;
    font-family: inherit; letter-spacing: .04em; outline: none; transition: border-color .25s; }
  input:focus { border-bottom-color: var(--ink); }
  input::placeholder { color: transparent; } /* épuré : pas d'exemple dans les champs de connexion */
  input:disabled { opacity: .3; }
  .field { margin-bottom: 30px; }
  .btn { width: 100%; background: transparent; border: 1px solid var(--line); color: var(--ink);
    border-radius: 0; padding: 15px 10px 14px; font-size: 11px; font-weight: 400; cursor: pointer;
    margin-top: 6px; letter-spacing: .3em; text-transform: uppercase; font-family: inherit;
    transition: background .25s, color .25s; }
  .btn:hover { background: var(--ink); color: var(--black); }
  .toggle { text-align: center; margin-top: 26px; }
  .toggle a { display: block; color: var(--muted); font-size: 9px; text-decoration: none; cursor: pointer;
    text-transform: uppercase; letter-spacing: .24em; padding: 7px 0; transition: color .2s; }
  .toggle a:hover { color: var(--ink); }
  .error { border: 1px solid var(--line-soft); border-left: 2px solid #e07a6a; color: #e07a6a;
    padding: 12px 14px; font-size: 11px; margin-bottom: 26px; letter-spacing: .04em; line-height: 1.7; }
  [data-theme="light"] .error { color: #b3402e; }
  @media (max-width: 767px) {
    body { padding: 32px 18px calc(24px + env(safe-area-inset-bottom)); }
    input { font-size: 16px; }
    .btn { min-height: 46px; }
  }
  /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
<script>
(function() {
  function getTheme() {
    const h = new Date().getHours();
    return (h >= 7 && h < 20) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.svg" alt="Editions Standard">
    <div class="kicker">CRM // Showroom</div>
    <h1>Editions Standard</h1>
    <p>Espace réservé — équipe & marques du showroom.</p>
  </div>
  <form method="POST" action="/admin/login" id="password-form">
    <script>if(location.search.includes('step=mfa')) document.write(''); else if(location.search.includes('error=locked')) document.write('<div class="error">Compte temporairement verrouillé suite à trop de tentatives. Réessayez dans quelques minutes.</div>'); else if(location.search.includes('error')) document.write('<div class="error">Identifiants incorrects.</div>')</script>
    <div id="email-field" class="field" style="display:none">
      <label>Email</label>
      <input type="email" name="email" id="email-input" placeholder="email@exemple.com" disabled autocomplete="off">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" name="password" autofocus placeholder="••••••••">
    </div>
    <button class="btn" type="submit">Connexion</button>
  </form>
  <form method="POST" action="/admin/login/mfa" id="mfa-form" style="display:none">
    <script>if(location.search.includes('step=mfa') && location.search.includes('error')) document.write('<div class="error">Code invalide.</div>')</script>
    <p style="color:var(--muted);font-size:12px;margin-bottom:18px;line-height:1.6">Entrez le code à 6 chiffres de votre application d'authentification, ou l'un de vos codes de secours.</p>
    <div class="field">
      <label>Code d'authentification</label>
      <input type="text" name="code" id="mfa-code-input" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="000000" autofocus>
    </div>
    <button class="btn" type="submit">Vérifier</button>
    <div class="toggle">
      <a onclick="toggleBackupCode()" id="backup-toggle-link">Utiliser un code de secours →</a>
    </div>
    <div class="field" id="backup-field" style="display:none;margin-top:12px">
      <label>Code de secours</label>
      <input type="text" name="backup_code" id="backup-code-input" placeholder="XXXXX-XXXXX" disabled>
    </div>
  </form>
  <div class="toggle" id="agent-toggle">
    <a onclick="toggleMode()" id="toggle-link">Connexion agent / designer →</a>
  </div>
  <div style="text-align:center;margin-top:22px;font-size:11px;letter-spacing:.04em;opacity:.6">
    <a href="/confidentialite" style="color:inherit;text-decoration:none">Confidentialité</a>
    <span style="margin:0 8px;opacity:.5">·</span>
    <a href="/cgu" style="color:inherit;text-decoration:none">CGU</a>
    <span style="margin:0 8px;opacity:.5">·</span>
    <a href="/mentions-legales" style="color:inherit;text-decoration:none">Mentions légales</a>
  </div>
</div>
<script>
function toggleMode() {
  const field = document.getElementById('email-field');
  const input = document.getElementById('email-input');
  const link = document.getElementById('toggle-link');
  const showingEmail = field.style.display === 'block';
  field.style.display = showingEmail ? 'none' : 'block';
  input.disabled = showingEmail;
  if (showingEmail) input.value = '';
  link.textContent = showingEmail ? 'Connexion agent / designer →' : '← Connexion owner';
}
function toggleBackupCode() {
  const codeField = document.getElementById('mfa-code-input');
  const backupField = document.getElementById('backup-field');
  const backupInput = document.getElementById('backup-code-input');
  const link = document.getElementById('backup-toggle-link');
  const showingBackup = backupField.style.display === 'block';
  backupField.style.display = showingBackup ? 'none' : 'block';
  backupInput.disabled = showingBackup;
  codeField.closest('.field').style.display = showingBackup ? 'block' : 'none';
  codeField.disabled = !showingBackup;
  if (!showingBackup) { codeField.value = ''; backupInput.focus(); } else { backupInput.value = ''; codeField.focus(); }
  link.textContent = showingBackup ? 'Utiliser un code de secours →' : '← Utiliser mon code à 6 chiffres';
}
if (location.search.includes('step=mfa')) {
  document.getElementById('password-form').style.display = 'none';
  document.getElementById('agent-toggle').style.display = 'none';
  document.getElementById('mfa-form').style.display = 'block';
}
</script>
</body>
</html>
