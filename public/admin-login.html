<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
<meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/fonts/brand.css">
<title>Editions Standard B2B Showroom — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { --black:#0a0a0a; --dark:#111; --border:#252525; --white:#f5f4f0; --muted:#555; --soft:#999; --accent:#CCEB3C; --dot:'Plex Mono','Space Mono',monospace; }
  [data-theme="light"] { --black:#f5f4f0; --dark:#fff; --border:#ddd; --white:#111; --muted:#888; --soft:#444; --accent:#6b8500; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Plex Mono', 'Space Mono', monospace; background: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; transition: background .2s, color .2s; background-size: 22px 22px; }
  [data-theme="light"] html, [data-theme="light"] body { }
  .card { background: var(--dark); border: 1px solid var(--border); border-radius: 0; padding: 48px 40px; width: 100%; max-width: 380px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .logo-wrap { text-align: center; margin-bottom: 32px; }
  .logo-wrap img { width: 64px; height: 64px; border-radius:0; }
  .logo-wrap .kicker { font-family: var(--dot), monospace; font-size: 10px; letter-spacing: .28em; color: var(--muted); margin-top: 16px; text-transform: uppercase; }
  .logo-wrap h1 { font-family: var(--dot), monospace; font-size: 18px; color: var(--white); font-weight: 400; margin-top: 6px; letter-spacing: .02em; }
  .logo-wrap p { color: var(--muted); font-size: 11px; margin-top: 4px; font-family: 'Plex Mono','Space Mono',monospace; text-transform: uppercase; letter-spacing: .1em; }
  label { display: block; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-family: 'Plex Mono','Space Mono',monospace; }
  input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); border-radius:0; padding: 7px 1px 9px; color: var(--white); font-size: 14px; font-family: 'Plex Mono','Space Mono',monospace; outline: none; transition: border-color .2s; }
  input:focus { border-bottom-color: var(--white); }
  .field { margin-bottom: 16px; }
  .btn { width: 100%; background: var(--accent); color: var(--black); border: none; border-radius:0; padding: 14px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .1em; text-transform: uppercase; font-family: 'Plex Mono', 'Space Mono', monospace; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .toggle { text-align: center; margin-top: 18px; }
  .toggle a { color: var(--soft); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: 'Plex Mono','Space Mono',monospace; }
  .error { background: #1a0a0a; border: 1px solid #c0392b33; color: #e74c3c; border-radius:0; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; font-family: 'Plex Mono','Space Mono',monospace; }
  /* Logo adaptatif au theme (SVG noir charge en <img> : recolore via filtre) */
  img[src*="logo.svg"]{filter:invert(1);}
  [data-theme="light"] img[src*="logo.svg"]{filter:none;}
</style>
<script>
(function() {
  function getTheme() {
    const h = new Date().getHours();
    return (h >= 7 && h < 20) ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', getTheme());
})();
</script>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.svg" alt="Editions Standard">
    <div class="kicker">CRM // Showroom</div>
    <h1>Editions Standard</h1>
    <p>Espace réservé — équipe & marques du showroom.</p>
  </div>
  <form method="POST" action="/admin/login" id="password-form">
    <script>if(location.search.includes('step=mfa')) document.write(''); else if(location.search.includes('error')) document.write('<div class="error">Identifiants incorrects.</div>')</script>
    <div id="email-field" class="field" style="display:none">
      <label>Email</label>
      <input type="email" name="email" id="email-input" placeholder="email@exemple.com" disabled autocomplete="off">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" name="password" autofocus placeholder="••••••••">
    </div>
    <button class="btn" type="submit">Connexion</button>
  </form>
  <form method="POST" action="/admin/login/mfa" id="mfa-form" style="display:none">
    <script>if(location.search.includes('step=mfa') && location.search.includes('error')) document.write('<div class="error">Code invalide.</div>')</script>
    <p style="color:var(--muted);font-size:12px;margin-bottom:18px;line-height:1.6">Entrez le code à 6 chiffres de votre application d'authentification, ou l'un de vos codes de secours.</p>
    <div class="field">
      <label>Code d'authentification</label>
      <input type="text" name="code" id="mfa-code-input" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" placeholder="000000" autofocus>
    </div>
    <button class="btn" type="submit">Vérifier</button>
    <div class="toggle">
      <a onclick="toggleBackupCode()" id="backup-toggle-link">Utiliser un code de secours →</a>
    </div>
    <div class="field" id="backup-field" style="display:none;margin-top:12px">
      <label>Code de secours</label>
      <input type="text" name="backup_code" id="backup-code-input" placeholder="XXXXX-XXXXX" disabled>
    </div>
  </form>
  <div class="toggle" id="agent-toggle">
    <a onclick="toggleMode()" id="toggle-link">Connexion agent / designer →</a>
  </div>
  <div style="text-align:center;margin-top:22px;font-size:11px;letter-spacing:.04em;opacity:.6">
    <a href="/confidentialite" style="color:inherit;text-decoration:none">Confidentialité</a>
    <span style="margin:0 8px;opacity:.5">·</span>
    <a href="/cgu" style="color:inherit;text-decoration:none">CGU</a>
    <span style="margin:0 8px;opacity:.5">·</span>
    <a href="/mentions-legales" style="color:inherit;text-decoration:none">Mentions légales</a>
  </div>
</div>
<script>
function toggleMode() {
  const field = document.getElementById('email-field');
  const input = document.getElementById('email-input');
  const link = document.getElementById('toggle-link');
  const showingEmail = field.style.display === 'block';
  field.style.display = showingEmail ? 'none' : 'block';
  input.disabled = showingEmail;
  if (showingEmail) input.value = '';
  link.textContent = showingEmail ? 'Connexion agent / designer →' : '← Connexion owner';
}
function toggleBackupCode() {
  const codeField = document.getElementById('mfa-code-input');
  const backupField = document.getElementById('backup-field');
  const backupInput = document.getElementById('backup-code-input');
  const link = document.getElementById('backup-toggle-link');
  const showingBackup = backupField.style.display === 'block';
  backupField.style.display = showingBackup ? 'none' : 'block';
  backupInput.disabled = showingBackup;
  codeField.closest('.field').style.display = showingBackup ? 'block' : 'none';
  codeField.disabled = !showingBackup;
  if (!showingBackup) { codeField.value = ''; backupInput.focus(); } else { backupInput.value = ''; codeField.focus(); }
  link.textContent = showingBackup ? 'Utiliser un code de secours →' : '← Utiliser mon code à 6 chiffres';
}
if (location.search.includes('step=mfa')) {
  document.getElementById('password-form').style.display = 'none';
  document.getElementById('agent-toggle').style.display = 'none';
  document.getElementById('mfa-form').style.display = 'block';
}
</script>
</body>
</html>
